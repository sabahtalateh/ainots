<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Призма = 3 пирамиды</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a1d23;color:#ddd;font-family:system-ui,sans-serif;}
  canvas{display:block;}
  #ctrl{
    position:absolute;top:0;right:0;bottom:0;width:230px;
    background:rgba(14,16,22,0.97);border-left:1px solid #252840;
    padding:14px;font-size:13px;user-select:none;
    display:flex;flex-direction:column;gap:10px;overflow-y:auto;
  }
  h3{margin:0 0 4px;font-size:13px;color:#a5c8ff;}
  .row{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;}
  .swatch{width:13px;height:13px;border-radius:3px;flex-shrink:0;}
  label{cursor:pointer;}
  #hint{font-size:11px;color:#556;margin-top:auto;line-height:1.8;}
  hr{border:none;border-top:1px solid #252840;margin:2px 0;}
  .note{font-size:11px;color:#778;line-height:1.6;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ctrl">
  <h3>Призма = 3 пирамиды</h3>

  <div>
    <div class="row"><div class="swatch" style="background:#4fc3f7"></div>
      <label><input type="checkbox" id="t1" checked> T₁ = {A, B, C, B'}</label></div>
    <div class="row"><div class="swatch" style="background:#ffb74d"></div>
      <label><input type="checkbox" id="t2" checked> T₂ = {A, C, B', C'}</label></div>
    <div class="row"><div class="swatch" style="background:#81c784"></div>
      <label><input type="checkbox" id="t3" checked> T₃ = {A, A', B', C'}</label></div>
  </div>

  <hr>
  <div class="row">
    <label><input type="checkbox" id="show-prism" checked> Контур призмы</label>
  </div>

  <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:#aaa;">
    Разнести
    <input type="range" id="explode" min="0" max="100" value="0"
      style="accent-color:#a5c8ff;cursor:pointer;">
  </label>

  <hr>
  <div class="note">
    Призма делится на 3 тетраэдра одинакового объёма.<br><br>
    Каждый = ⅓·S·h<br>
    ⇒ V<sub>пирамиды</sub> = ⅓·S·h
  </div>

  <div id="hint">Тяни — вращение<br>Колёсико — зум</div>
</div>

<script>
(function(){
  var DPR = window.devicePixelRatio||1;
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var SBW = 230, cW=0, cH=0;
  var gFaces=[], gEdges=[], gLabels=[];

  // Prism: right-triangle base, A at origin
  var A  = [0, 0, 0];
  var B  = [3, 0, 0];
  var C  = [0, 2, 0];
  var Ap = [0, 0, 3];
  var Bp = [3, 0, 3];
  var Cp = [0, 2, 3];

  var pCtr = [
    (A[0]+B[0]+C[0]+Ap[0]+Bp[0]+Cp[0])/6,
    (A[1]+B[1]+C[1]+Ap[1]+Bp[1]+Cp[1])/6,
    (A[2]+B[2]+C[2]+Ap[2]+Bp[2]+Cp[2])/6
  ];

  // Camera
  var cam = {theta:0.65, phi:0.48};
  var gScale = 1.0;
  var drag = {active:false, x:0, y:0};
  window.addEventListener('mousedown', function(e){
    if(e.target.closest('#ctrl')) return;
    drag.active=true; drag.x=e.clientX; drag.y=e.clientY;
  });
  window.addEventListener('mouseup', function(){ drag.active=false; });
  window.addEventListener('mousemove', function(e){
    if(!drag.active) return;
    cam.theta -= (e.clientX-drag.x)*0.007;
    cam.phi   -= (e.clientY-drag.y)*0.007;
    cam.phi = Math.max(0.05, Math.min(Math.PI/2-0.03, cam.phi));
    drag.x=e.clientX; drag.y=e.clientY;
  });
  window.addEventListener('wheel', function(e){
    gScale = Math.max(0.3, Math.min(4, gScale - e.deltaY*0.001));
  },{passive:true});

  function project(p){
    var ct=Math.cos(cam.theta), st=Math.sin(cam.theta);
    var cp=Math.cos(cam.phi),   sp=Math.sin(cam.phi);
    var rx = ct*p[0]+st*p[1];
    var ry = -st*p[0]+ct*p[1];
    return [rx, -sp*ry+cp*p[2]];
  }
  function scr(p3,sc,ox,oy){ var p=project(p3); return{x:ox+p[0]*sc, y:oy-p[1]*sc}; }
  function line3(p,q,sc,ox,oy){ var a=scr(p,sc,ox,oy),b=scr(q,sc,ox,oy); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); }

  function dpt(p){
    var ct=Math.cos(cam.theta), st=Math.sin(cam.theta);
    var cp=Math.cos(cam.phi),   sp=Math.sin(cam.phi);
    return cp*(-st*p[0]+ct*p[1]) + sp*p[2];
  }
  function avgDpt(pts){ var d=0; pts.forEach(function(p){d+=dpt(p);}); return d/pts.length; }

  function face3(pts,col,alpha){
    gFaces.push({pts:pts.slice(),color:col,alpha:alpha,depth:avgDpt(pts)});
  }
  function collectEdge(pairs,col,lw,dash){
    var pts=[]; pairs.forEach(function(e){pts.push(e[0],e[1]);});
    gEdges.push({pairs:pairs,color:col,lw:lw,dash:dash||[],depth:avgDpt(pts)});
  }
  function label3d(pt,text,col,size){
    gLabels.push({pt:pt.slice(),text:text,col:col,size:size||13,depth:dpt(pt)});
  }

  function flushScene(sc,ox,oy){
    gFaces.sort(function(a,b){return a.depth-b.depth;});
    gFaces.forEach(function(f){
      var ps=f.pts.map(function(p){return scr(p,sc,ox,oy);});
      ctx.beginPath(); ctx.moveTo(ps[0].x,ps[0].y);
      for(var i=1;i<ps.length;i++) ctx.lineTo(ps[i].x,ps[i].y);
      ctx.closePath(); ctx.globalAlpha=f.alpha; ctx.fillStyle=f.color; ctx.fill();
      ctx.globalAlpha=1;
    });
    gFaces.length=0;
    gEdges.sort(function(a,b){return a.depth-b.depth;});
    gEdges.forEach(function(g){
      ctx.setLineDash(g.dash);
      ctx.beginPath(); ctx.strokeStyle=g.color; ctx.lineWidth=g.lw;
      g.pairs.forEach(function(e){line3(e[0],e[1],sc,ox,oy);}); ctx.stroke();
    });
    ctx.setLineDash([]);
    gEdges.length=0;
    gLabels.sort(function(a,b){return a.depth-b.depth;});
    gLabels.forEach(function(l){
      var p=scr(l.pt,sc,ox,oy);
      ctx.save(); ctx.font='bold '+l.size+'px system-ui,sans-serif';
      ctx.fillStyle=l.col; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(l.text,p.x,p.y); ctx.restore();
    });
    gLabels.length=0;
  }

  function add3(a,b){return [a[0]+b[0],a[1]+b[1],a[2]+b[2]];}
  function sub3(a,b){return [a[0]-b[0],a[1]-b[1],a[2]-b[2]];}
  function scl3(a,s){return [a[0]*s,a[1]*s,a[2]*s];}
  function tetCtr(vs){
    return [(vs[0][0]+vs[1][0]+vs[2][0]+vs[3][0])/4,
            (vs[0][1]+vs[1][1]+vs[2][1]+vs[3][1])/4,
            (vs[0][2]+vs[1][2]+vs[2][2]+vs[3][2])/4];
  }

  function drawTet(vs, fillCol, strokeCol, alpha, t){
    var ctr = tetCtr(vs);
    var off = scl3(sub3(ctr, pCtr), t);
    var v = vs.map(function(p){ return add3(p, off); });
    // 4 triangular faces (all combos of 3 from 4)
    [[0,1,2],[0,1,3],[0,2,3],[1,2,3]].forEach(function(f){
      face3([v[f[0]],v[f[1]],v[f[2]]], fillCol, alpha);
    });
    // 6 edges
    collectEdge([[v[0],v[1]],[v[0],v[2]],[v[0],v[3]],[v[1],v[2]],[v[1],v[3]],[v[2],v[3]]],
      strokeCol, 1.6);
    // label at centroid
    var lp = add3(ctr, off);
    var name = (vs===tet1)?'T₁':(vs===tet2?'T₂':'T₃');
    label3d(lp, name, strokeCol, 14);
  }

  // nudge vertex label outward from prism center
  function vtxLabel(p, name){
    var nf=0.22;
    var lp=[p[0]+(p[0]-pCtr[0])*nf, p[1]+(p[1]-pCtr[1])*nf, p[2]+(p[2]-pCtr[2])*nf];
    label3d(lp, name, 'rgba(255,255,255,0.9)', 13);
  }

  var tet1 = [A,  B,  C,  Bp];
  var tet2 = [A,  C,  Bp, Cp];
  var tet3 = [A,  Ap, Bp, Cp];

  function resize(){
    cW=window.innerWidth; cH=window.innerHeight;
    canvas.width=Math.round(cW*DPR); canvas.height=Math.round(cH*DPR);
    canvas.style.width=cW+'px'; canvas.style.height=cH+'px';
  }
  window.addEventListener('resize', resize); resize();

  function tick(){
    ctx.setTransform(DPR,0,0,DPR,0,0);
    var W=cW, H=cH, dW=W-SBW;
    var sc = Math.min(dW,H)*gScale/11;
    var ox=dW/2, oy=H/2;
    var pc=project(pCtr); ox-=pc[0]*sc; oy+=pc[1]*sc;

    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#1a1d23'; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,dW,H); ctx.clip();

    gFaces=[]; gEdges=[]; gLabels=[];

    var t   = +document.getElementById('explode').value / 100;
    var sh1 = document.getElementById('t1').checked;
    var sh2 = document.getElementById('t2').checked;
    var sh3 = document.getElementById('t3').checked;
    var shP = document.getElementById('show-prism').checked;

    if(sh1) drawTet(tet1, 'rgba(79,195,247,1)',  '#4fc3f7', 0.32, t);
    if(sh2) drawTet(tet2, 'rgba(255,183,77,1)',  '#ffb74d', 0.32, t);
    if(sh3) drawTet(tet3, 'rgba(129,199,132,1)', '#81c784', 0.32, t);

    // prism outline at original position
    if(shP){
      collectEdge([[A,B],[B,C],[C,A],[Ap,Bp],[Bp,Cp],[Cp,Ap],[A,Ap],[B,Bp],[C,Cp]],
        'rgba(200,200,220,0.28)', 1.2, [5,4]);
    }

    // vertex labels always at original prism positions
    vtxLabel(A,  'A');
    vtxLabel(B,  'B');
    vtxLabel(C,  'C');
    vtxLabel(Ap, "A'");
    vtxLabel(Bp, "B'");
    vtxLabel(Cp, "C'");

    flushScene(sc,ox,oy);
    ctx.restore();
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
