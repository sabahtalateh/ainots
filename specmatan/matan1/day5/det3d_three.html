<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>3D</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
  :root{
    --col-a:#e74c3c; --col-b:#2ecc71; --col-c:#3498db;
    --bg:#1a1d23; --text:#ddd; --text-dim:#aaa; --text-mute:#556;
    --sb-bg:rgba(15,18,28,0.82); --sb-border:rgba(80,100,160,0.25);
    --tog-bg:rgba(15,18,28,0.55); --tog-col:#aab; --tog-hover:#ddd;
    --h3:#a5c8ff;
    --btn-bg:#22263a; --btn-border:#3a4060; --btn-col:#ccc; --btn-hover:#3a4060;
    --sep:#252840; --sep2:#1e2235;
    --tbl-header-bg:rgba(255,255,255,0.03); --tbl-border:rgba(80,100,160,0.25);
    --label-bg:rgba(10,12,18,0.72); --td-text:#ccc; --th-text:#667;
  }
  body.light{
    --col-a:#a82010; --col-b:#1a7a30; --col-c:#1650a0;
    --bg:#f0f2f5; --text:#1a1a2e; --text-dim:#555; --text-mute:#999;
    --sb-bg:rgba(235,238,248,0.82); --sb-border:rgba(100,120,200,0.3);
    --tog-bg:rgba(235,238,248,0.75); --tog-col:#557; --tog-hover:#1a1a2e;
    --h3:#1a5cb0;
    --btn-bg:#e4e8f4; --btn-border:#b0b8d8; --btn-col:#333; --btn-hover:#c8d0e8;
    --sep:#d0d4e8; --sep2:#dde0f0;
    --tbl-header-bg:rgba(0,0,0,0.04); --tbl-border:rgba(100,120,200,0.3);
    --label-bg:rgba(235,238,248,0.88); --td-text:#333; --th-text:#778;
  }
  html{margin:0;height:100%;overflow:hidden;}
  body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;display:flex;}
  #scene-wrap{flex:1;position:relative;overflow:hidden;height:100%;}
  #c{display:block;position:absolute;top:0;left:0;}
  #formula-list table{width:auto;}
  .scene-btn{
    position:absolute;z-index:11;
    width:32px;height:32px;border-radius:50%;
    background:var(--tog-bg);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--sb-border);
    color:var(--tog-col);font-size:15px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .scene-btn:hover{color:var(--tog-hover);}
  #theme-toggle{top:12px;left:50px;}
  #vec-toggle{top:12px;left:10px;font-size:13px;font-weight:bold;}
  #vec-panel{
    position:absolute;z-index:20;
    background:rgba(15,18,28,0.45);
    backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
    border:1px solid var(--sb-border);
    border-radius:6px;
    font-size:12px;user-select:none;min-width:180px;
  }
  #vec-panel-handle{
    height:18px;border-radius:6px 6px 0 0;cursor:grab;
    display:flex;align-items:center;
    border-bottom:1px solid var(--sb-border);
  }
  #vec-panel-handle:active{cursor:grabbing;}
  #vec-panel-close:hover{color:rgba(200,160,160,0.9)!important;}
  #vec-panel-body{padding:10px 12px;}
  h3{margin:0 0 2px;font-size:13px;color:var(--h3);}
  table{border-collapse:collapse;width:100%;}
  td{padding:2px;vertical-align:middle;}
  .va{color:var(--col-a);font-weight:bold;}
  .vb{color:var(--col-b);font-weight:bold;}
  .vc{color:var(--col-c);font-weight:bold;}
  .btn{
    background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--btn-col);
    border-radius:4px;width:20px;height:20px;cursor:pointer;
    font-size:13px;line-height:1;padding:0;text-align:center;
  }
  .btn:hover{background:var(--btn-hover);}
  #scene-divider{
    position:absolute;top:0;bottom:0;width:5px;
    transform:translateX(-50%);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    background:rgba(80,100,180,0.25);
    border-left:1px solid rgba(100,130,220,0.5);
    border-right:1px solid rgba(100,130,220,0.5);
    display:none;z-index:3;pointer-events:none;
  }
  #sb-handle{
    width:5px;flex-shrink:0;cursor:col-resize;z-index:11;
    background:var(--sb-border);
    transition:background 0.15s;
  }
  #sb-handle:hover,#sb-handle.dragging{background:rgba(100,120,200,0.5);}
  #formulas{
    flex-shrink:0;z-index:10;
    background:var(--sb-bg);
    backdrop-filter:blur(8px) saturate(1.3);
    -webkit-backdrop-filter:blur(8px) saturate(1.3);
    border-left:1px solid var(--sb-border);
    padding:14px 18px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;
    font-size:12px;user-select:none;
  }
  #formula-list table{width:auto;}
  #formulas h3{margin:0 0 4px;font-size:12px;color:var(--h3);}
  .frow{display:flex;flex-direction:column;gap:2px;padding:5px 0;border-top:1px solid var(--sep2);}
  .frow:first-child{border-top:none;}
  .fsym{color:var(--text-mute);font-size:11px;line-height:1.5;}
  .fval{font-size:13px;font-weight:bold;}
</style>
</head>
<body>
<div id="scene-wrap">
<canvas id="c"></canvas>
<canvas id="c2" style="display:none;position:absolute;top:0;"></canvas>
<div id="scene-divider"></div>
<button id="vec-toggle" class="scene-btn" title="Vector controls">v</button>
<button id="theme-toggle" class="scene-btn" title="Toggle theme">☀</button>
<div id="vec-panel">
  <div id="vec-panel-handle"><span style="flex:1"></span><span style="letter-spacing:3px;font-size:10px;color:rgba(120,140,180,0.4);">· · ·</span><span style="flex:1;display:flex;justify-content:flex-end;padding-right:5px;"><button id="vec-panel-close" style="background:none;border:none;color:rgba(120,140,180,0.5);cursor:pointer;font-size:13px;line-height:1;padding:0;">×</button></span></div>
  <div id="vec-panel-body"></div>
</div>
</div>
<div id="sb-handle"></div>
<div id="formulas">
  <div id="vec-section" style="display:none">
    <span id="a0"></span><span id="a1"></span><span id="a2"></span>
    <span id="b0"></span><span id="b1"></span><span id="b2"></span>
    <span id="c0"></span><span id="c1"></span><span id="c2"></span>
    <b id="detval"></b>
  </div>
  <div id="formula-list"></div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let SBW = (() => { try { const v = +localStorage.getItem('det3d_sbw'); return v >= 160 && v <= 600 ? v : 280; } catch(e) { return 280; } })();
const VEC_KEY = 'det3d_vecs';
const CAM_KEY = 'det3d_cam3';
const MEM_KEY = 'det3d_vecmem';
let vecMem = Array(10).fill(null);

/* ── vectors ── */
let _sv = null;
try { const s = localStorage.getItem(VEC_KEY); if (s) _sv = JSON.parse(s); } catch(e){}
let A = _sv ? _sv.A : [3,1,1];
let B = _sv ? _sv.B : [1,3,1];
let C = _sv ? _sv.C : [1,1,3];
const vecs = {A, B, C};
const spans = {
  A: [document.getElementById('a0'), document.getElementById('a1'), document.getElementById('a2')],
  B: [document.getElementById('b0'), document.getElementById('b1'), document.getElementById('b2')],
  C: [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')]
};
['A','B','C'].forEach(k => vecs[k].forEach((v,i) => spans[k][i].textContent = v));
function saveVecs(){ try{ localStorage.setItem(VEC_KEY, JSON.stringify({A,B,C})); }catch(e){} }
function saveVecMem(){ try{ localStorage.setItem(MEM_KEY, JSON.stringify(vecMem)); }catch(e){} }
function renderVecPanel(){
  const panel = document.getElementById('vec-panel');
  const body  = document.getElementById('vec-panel-body');
  if (!panel || !body) return;
  panel.style.display = vecPanelOpen ? '' : 'none';
  if (!vecPanelOpen) return;
  const [ax,ay,az]=A,[bx,by,bz]=B,[cx,cy,cz]=C;
  const cs=getComputedStyle(document.body);
  const ra=cs.getPropertyValue('--col-a').trim();
  const rb=cs.getPropertyValue('--col-b').trim();
  const rc=cs.getPropertyValue('--col-c').trim();
  const detColor='#'+T().bbox.toString(16).padStart(6,'0');
  const sep=cs.getPropertyValue('--sep').trim();
  const textDim=cs.getPropertyValue('--text-dim').trim();
  const textMute=cs.getPropertyValue('--text-mute').trim();
  const bS=`background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--btn-col);border-radius:4px;width:20px;height:20px;cursor:pointer;font-size:13px;line-height:1;padding:0;text-align:center;`;
  const row=(v,col,vals)=>`<tr>
    <td style="padding:2px 4px 2px 0;"><span style="color:${col};font-weight:bold;">${v}</span></td>
    ${[0,1,2].map(i=>`<td style="padding:2px 2px;text-align:right;min-width:18px;">${vals[i]}</td><td style="padding:2px 1px;white-space:nowrap;"><button class="btn" data-v="${v.toUpperCase()}" data-i="${i}" data-d="-1" style="${bS}">−</button><button class="btn" data-v="${v.toUpperCase()}" data-i="${i}" data-d="1" style="${bS}">+</button></td>`).join('')}
  </tr>`;
  const wBtnS=`font-size:11px;padding:3px 0;width:100%;border-radius:2px;cursor:pointer;border:1px solid #444;background:none;color:#aab;line-height:1;`;
  const memCells=Array.from({length:10},(_,i)=>{
    const hasData=vecMem[i]!==null;
    const rBtnS=`font-size:11px;padding:3px 0;width:100%;border-radius:2px;cursor:pointer;border:1px solid ${hasData?'#446':'#333'};background:none;color:${hasData?'#88c':'#446'};line-height:1;${hasData?'':'pointer-events:none;opacity:0.3;'}`;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 2px;border:1px solid ${hasData?'#446':'#334'};border-radius:3px;background:${hasData?'rgba(80,80,140,0.12)':'none'};">
      <span style="font-size:9px;color:${hasData?'#99b':'#556'};font-weight:bold;line-height:1;">M${i+1}</span>
      <button class="vec-mem-w" data-slot="${i}" style="${wBtnS}">W</button>
      <button class="vec-mem-r" data-slot="${i}" style="${rBtnS}">R</button>
    </div>`;
  }).join('');
  body.innerHTML=`
    <table style="border-collapse:collapse;margin-bottom:6px;">
      <tr><td></td>
        <td colspan="2" style="text-align:center;color:${ra};font-size:11px;padding-bottom:2px;">x</td>
        <td colspan="2" style="text-align:center;color:${rb};font-size:11px;padding-bottom:2px;">y</td>
        <td colspan="2" style="text-align:center;color:${rc};font-size:11px;padding-bottom:2px;">z</td>
      </tr>
      ${row('a',ra,[ax,ay,az])}${row('b',rb,[bx,by,bz])}${row('c',rc,[cx,cy,cz])}
    </table>
    <div style="font-size:13px;color:${textDim};border-top:1px solid ${sep};padding-top:6px;margin-bottom:6px;">det = <b style="color:${detColor}">${det3(A,B,C)}</b></div>
    <div style="border-top:1px solid ${sep};padding-top:6px;">
      <div style="font-size:10px;color:#778;margin-bottom:4px;letter-spacing:0.05em;text-transform:uppercase;">Memory</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;">${memCells}</div>
    </div>`;
}
function det3(a,b,c){ return a[0]*(b[1]*c[2]-b[2]*c[1]) - a[1]*(b[0]*c[2]-b[2]*c[0]) + a[2]*(b[0]*c[1]-b[1]*c[0]); }
function updateDet(){ document.getElementById('detval').textContent = det3(A,B,C); }
updateDet();
const eyeState = {a: false, b: false, c: false, pyr: false, pyrb: false, pyrc: false, prismab: false, prismbc: false, prismac: false, bridges: false, prismb1: false, axbycz: false, bxcyaz: false, cxaybz: false, bxaycz: false, cxbyaz: false, axcybz: false};
const tableVis = {a:false, b:false, c:false, pyr:false, pyrb:false, pyrc:false, prismab:false, prismbc:false, prismac:false, prismb1:false, prismbc1:false, prismba1:false, axbycz:false, bxcyaz:false, cxaybz:false, bxaycz:false, cxbyaz:false, axcybz:false};
const FORMULA_PART_KEYS = new Set(['axbycz','bxcyaz','cxaybz','bxaycz','cxbyaz','axcybz']);
const togGroupMap = {
  'show-abox':'a','show-abox2':'a','show-aboxes':'a',
  'show-bbox1':'b','show-bbox2':'b','show-bboxes':'b',
  'show-cbox1':'c','show-cbox2':'c','show-cboxes':'c',
  'show-axbycz':'axbycz', 'show-bxcyaz':'bxcyaz', 'show-cxaybz':'cxaybz', 'show-bxaycz':'bxaycz', 'show-cxbyaz':'cxbyaz', 'show-axcybz':'axcybz',
  'show-pyr1':'pyr','show-pyr2':'pyr','show-apyrs':'pyr','show-all-pyrs':'pyr',
  'show-bpyr1':'pyrb','show-bpyr2':'pyrb','show-bpyrs':'pyrb',
  'show-cpyr1':'pyrc','show-cpyr2':'pyrc','show-cpyrs':'pyrc',
  'show-prism1':'prismab','show-prism2':'prismab',
  'show-prism3':'prismac','show-prism4':'prismac',
  'show-prism5':'prismbc','show-prism6':'prismbc',
  'show-bridge':'prismb1','show-bridge1':'prismb1',
  'show-bridgebc':'prismbc1','show-bridgeb2c2':'prismbc1',
  'show-bridgea1b2':'prismba1','show-bridgeb1a2':'prismba1'
};
let hoverGroup = null;
let selGroup = null;

const TOPS_IDS = ['show-abox2','show-bbox2','show-cbox2','show-pyr2','show-bpyr2','show-cpyr2','show-prism2','show-prism4','show-prism6','show-bridge','show-bridgeb2c2','show-bridgeb1a2'];
let alphaVal = 22;
let dimBoxes = false;
const dimZeros = true;
let showTops = false;
let bridgeSplit = false;
let showNzMode = false;
let showMode = 'figures';
const VEC_PANEL_KEY = 'det3d_vecpanel';
let vecPanelOpen = localStorage.getItem(VEC_PANEL_KEY) !== 'false';
let selCube = null;

const THEME_KEY = 'det3d_theme';
let darkMode = localStorage.getItem(THEME_KEY) !== 'light';
const THEMES = {
  dark:  { bg:0x1a1d23, axX:0x7a2820, axY:0x1e7a45, axZ:0x1e4a7a, bbox:0xf1c40f, dc:0x8c8c96, labelBg:'rgba(10,12,18,0.72)' },
  light: { bg:0xf0f2f5, axX:0xcc2200, axY:0x009944, axZ:0x0055cc, bbox:0x998800, dc:0xb0b0b8, labelBg:'rgba(235,238,248,0.88)' },
};
function T() { return darkMode ? THEMES.dark : THEMES.light; }

function updateFormulas() {
  const [ax,ay,az] = A, [bx,by,bz] = B, [cx,cy,cz] = C;
  const cs0 = getComputedStyle(document.body);
  const ra = cs0.getPropertyValue('--col-a').trim();
  const rb = cs0.getPropertyValue('--col-b').trim();
  const rc = cs0.getPropertyValue('--col-c').trim();
  function k(col, s) { return `\\textcolor{${col}}{${s}}`; }
  // kd: dim a single component via a muted colour when its value is zero
  const kd = (col, s, v, rz) => (!rz && v===0) ? `\\textcolor{#3d4255}{${s}}` : k(col,s);
  // kpd: build a term string with per-component dimming
  const kpd = (coeff, rz, ...triples) => `${coeff}${triples.map(([c,s,v])=>kd(c,s,v,rz)).join('')}`;
  const val = ay * az * (bx + cx);
  const r = s => katex.renderToString(s, {throwOnError: false, displayMode: false});
  const aSymParts = {
    lhs: rz => `(${kd(rb,'b_x',bx,rz)} + ${kd(rc,'c_x',cx,rz)})${kd(ra,'a_y',ay,rz)}${kd(ra,'a_z',az,rz)} = `,
    terms: [
      {coeff:'',           comps:[[rb,'b_x',bx],[ra,'a_y',ay],[ra,'a_z',az]]},
      {coeff:'+',          comps:[[rc,'c_x',cx],[ra,'a_y',ay],[ra,'a_z',az]]},
    ]};
  const bSymParts = {
    lhs: rz => `${kd(rb,'b_x',bx,rz)}(${kd(ra,'a_y',ay,rz)} + ${kd(rc,'c_y',cy,rz)})${kd(rb,'b_z',bz,rz)} = `,
    terms: [
      {coeff:'',           comps:[[rb,'b_x',bx],[ra,'a_y',ay],[rb,'b_z',bz]]},
      {coeff:'+',          comps:[[rb,'b_x',bx],[rc,'c_y',cy],[rb,'b_z',bz]]},
    ]};
  const cSymParts = {
    lhs: rz => `${kd(rc,'c_x',cx,rz)}${kd(rc,'c_y',cy,rz)}(${kd(ra,'a_z',az,rz)} + ${kd(rb,'b_z',bz,rz)}) = `,
    terms: [
      {coeff:'',           comps:[[rc,'c_x',cx],[rc,'c_y',cy],[ra,'a_z',az]]},
      {coeff:'+',          comps:[[rc,'c_x',cx],[rc,'c_y',cy],[rb,'b_z',bz]]},
    ]};
  const pyrSym  = `\\tfrac{1}{3} ${k(ra,'a_x')} \\cdot ${k(ra,'a_y')} \\cdot ${k(ra,'a_z')}`;
  const pyrBSym = `\\tfrac{1}{3} ${k(rb,'b_x')} \\cdot ${k(rb,'b_y')} \\cdot ${k(rb,'b_z')}`;
  const pyrCSym    = `\\tfrac{1}{3} ${k(rc,'c_x')} \\cdot ${k(rc,'c_y')} \\cdot ${k(rc,'c_z')}`;
  const cab = '#c8a020';
  const prismABParts = {
    lhs: rz => `\\tfrac{1}{2}(${kd(ra,'a_x',ax,rz)}${kd(rb,'b_y',by,rz)} - ${kd(ra,'a_y',ay,rz)}${kd(rb,'b_x',bx,rz)})(${kd(ra,'a_z',az,rz)} + ${kd(rb,'b_z',bz,rz)}) = `,
    terms: [
      {coeff:'\\tfrac{1}{2}',  comps:[[ra,'a_x',ax],[rb,'b_y',by],[ra,'a_z',az]]},
      {coeff:'+\\tfrac{1}{2}', comps:[[ra,'a_x',ax],[rb,'b_y',by],[rb,'b_z',bz]]},
      {coeff:'-\\tfrac{1}{2}', comps:[[rb,'b_x',bx],[ra,'a_y',ay],[ra,'a_z',az]]},
      {coeff:'-\\tfrac{1}{2}', comps:[[rb,'b_x',bx],[ra,'a_y',ay],[rb,'b_z',bz]]},
    ]};
  const cbc = '#20b8c8';
  const prismBCParts = {
    lhs: rz => `\\tfrac{1}{2}(${kd(rb,'b_y',by,rz)}${kd(rc,'c_z',cz,rz)} - ${kd(rb,'b_z',bz,rz)}${kd(rc,'c_y',cy,rz)})(${kd(rb,'b_x',bx,rz)} + ${kd(rc,'c_x',cx,rz)}) = `,
    terms: [
      {coeff:'\\tfrac{1}{2}',  comps:[[rb,'b_x',bx],[rb,'b_y',by],[rc,'c_z',cz]]},
      {coeff:'+\\tfrac{1}{2}', comps:[[rc,'c_x',cx],[rb,'b_y',by],[rc,'c_z',cz]]},
      {coeff:'-\\tfrac{1}{2}', comps:[[rb,'b_x',bx],[rc,'c_y',cy],[rb,'b_z',bz]]},
      {coeff:'-\\tfrac{1}{2}', comps:[[rc,'c_x',cx],[rc,'c_y',cy],[rb,'b_z',bz]]},
    ]};
  const cac = '#b060e0';
  const prismACParts = {
    lhs: rz => `\\tfrac{1}{2}(${kd(ra,'a_x',ax,rz)}${kd(rc,'c_z',cz,rz)} - ${kd(ra,'a_z',az,rz)}${kd(rc,'c_x',cx,rz)})(${kd(ra,'a_y',ay,rz)} + ${kd(rc,'c_y',cy,rz)}) = `,
    terms: [
      {coeff:'\\tfrac{1}{2}',  comps:[[ra,'a_x',ax],[ra,'a_y',ay],[rc,'c_z',cz]]},
      {coeff:'+\\tfrac{1}{2}', comps:[[ra,'a_x',ax],[rc,'c_y',cy],[rc,'c_z',cz]]},
      {coeff:'-\\tfrac{1}{2}', comps:[[rc,'c_x',cx],[ra,'a_y',ay],[ra,'a_z',az]]},
      {coeff:'-\\tfrac{1}{2}', comps:[[rc,'c_x',cx],[rc,'c_y',cy],[ra,'a_z',az]]},
    ]};
  const prismB1Parts = {lhs:'', terms:[
    {coeff:'',           comps:[[rc,'c_x',cx],[rb,'b_y',by],[ra,'a_z',az]]},
    {coeff:'+\\tfrac{1}{2}', comps:[[rc,'c_x',cx],[rb,'b_y',by],[rb,'b_z',bz]]},
    {coeff:'+\\tfrac{1}{2}', comps:[[rb,'b_x',bx],[rb,'b_y',by],[ra,'a_z',az]]},
    {coeff:'+\\tfrac{1}{6}', comps:[[rb,'b_x',bx],[rb,'b_y',by],[rb,'b_z',bz]]},
  ]};
  const prismBC1Parts = {lhs:'', terms:[
    {coeff:'',           comps:[[ra,'a_x',ax],[rc,'c_y',cy],[rb,'b_z',bz]]},
    {coeff:'+\\tfrac{1}{2}', comps:[[ra,'a_x',ax],[ra,'a_y',ay],[rb,'b_z',bz]]},
    {coeff:'+\\tfrac{1}{2}', comps:[[ra,'a_x',ax],[rc,'c_y',cy],[ra,'a_z',az]]},
    {coeff:'+\\tfrac{1}{6}', comps:[[ra,'a_x',ax],[ra,'a_y',ay],[ra,'a_z',az]]},
  ]};
  const prismBA1Parts = {lhs:'', terms:[
    {coeff:'',           comps:[[rb,'b_x',bx],[ra,'a_y',ay],[rc,'c_z',cz]]},

function computeFv() {
  const [ax,ay,az]=A,[bx,by,bz]=B,[cx,cy,cz]=C;
  return {
    a:ax*ay*az, b:bx*by*bz, c:cx*cy*cz,
    pyr:ax*ay*az, pyrb:bx*by*bz, pyrc:cx*cy*cz,
    prismab:(ax*by-ay*bx)*(az+bz),
    prismbc:(by*cz-bz*cy)*(bx+cx),
    prismac:(ax*cz-az*cx)*(ay+cy),
    prismbc1:ax*cy*bz+0.5*ax*ay*bz+0.5*ax*cy*az+ax*ay*az/6,
    prismb1:cx*by*az+0.5*cx*by*bz+0.5*bx*by*az+bx*by*bz/6,
    prismba1:bx*ay*cz+0.5*cx*ay*cz+0.5*bx*cy*cz+cx*cy*cz/6,
    axbycz:ax*by*cz, bxcyaz:bx*cy*az, cxaybz:cx*ay*bz, bxaycz:bx*ay*cz, cxbyaz:cx*by*az, axcybz:ax*cy*bz,
  };
}

  if (!showNzMode) return;

/* ── snap camera (animated) ── */
const SNAP_DIST = 60;
const SNAP_MS   = 500;
let savedFreePos    = null;
let savedFreeTarget = null;
let savedFreeUp     = null;
let inSnapView      = false;
let camAnim = null;

function animateTo(toPos, toTarget, toUp) {
  const fromPos    = cam.position.clone();
  const fromTarget = controls.target.clone();
  const fromUp     = cam.up.clone();
  const start      = performance.now();
  if (camAnim) cancelAnimationFrame(camAnim);
  function step(now) {
    const t = Math.min((now - start) / SNAP_MS, 1);
    const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out quad
    cam.position.lerpVectors(fromPos, toPos, e);
    controls.target.lerpVectors(fromTarget, toTarget, e);
    cam.up.lerpVectors(fromUp, toUp, e).normalize();
    controls.update();
    if (t < 1) camAnim = requestAnimationFrame(step);
  }
  camAnim = requestAnimationFrame(step);
}

function snapCamera(axis) {
  const t = controls.target.clone();
  if (axis === 'free') {
    if (savedFreePos) {
      inSnapView = false;
      animateTo(savedFreePos, savedFreeTarget, savedFreeUp);
    }
    return;
  }
  if (!inSnapView) {
    savedFreePos    = cam.position.clone();
    savedFreeTarget = controls.target.clone();
    savedFreeUp     = cam.up.clone();
  }
  inSnapView = true;
  let toPos, toUp;
  if      (axis === 'yz') { toPos = new THREE.Vector3(t.x+SNAP_DIST, t.y, t.z); toUp = new THREE.Vector3(0,0,1); }
  else if (axis === 'xz') { toPos = new THREE.Vector3(t.x, t.y-SNAP_DIST, t.z); toUp = new THREE.Vector3(0,0,1); }
  else                    { toPos = new THREE.Vector3(t.x, t.y, t.z+SNAP_DIST); toUp = new THREE.Vector3(0,1,0); }
  animateTo(toPos, t, toUp);
}
['yz','xz','xy','free'].forEach(ax =>
  document.getElementById('snap-'+ax)?.addEventListener('click', () => snapCamera(ax))
);

/* ── axes ── */
function makeArrow(dir, col, len, r = 0.045, onTop = false) {
  const g = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: col, depthTest: !onTop });
  const d = new THREE.Vector3(...dir).normalize();
  const coneH = onTop ? SZ.vecConeH : SZ.axisConeH;
  const shaftLen = len - coneH;
  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(r, r, shaftLen, 8), mat);
  shaft.position.copy(d.clone().multiplyScalar(shaftLen / 2));
  shaft.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), d);
  if (onTop) shaft.renderOrder = 999;
  g.add(shaft);
  const cone = new THREE.Mesh(new THREE.ConeGeometry(r * 2.5, coneH, 8), mat);
  cone.position.copy(d.clone().multiplyScalar(len - coneH / 2));
  cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), d);
  if (onTop) cone.renderOrder = 999;
  g.add(cone);
  return g;
}
const axisGroup = new THREE.Group();
scene.add(axisGroup);
function buildAxes() {
  while (axisGroup.children.length) axisGroup.remove(axisGroup.children[0]);
  const t = T(), len = SZ.axisLen;
  axisGroup.add(makeArrow([1,0,0], t.axX, len, SZ.axisR));
  axisGroup.add(makeArrow([0,1,0], t.axY, len, SZ.axisR));
  axisGroup.add(makeArrow([0,0,1], t.axZ, len, SZ.axisR));
}
buildAxes();

function drawLabel(p, text, col, bold, size, noBg) {
  lctx.font = (bold ? 'bold ' : '') + (size||11) + 'px system-ui';
  lctx.textAlign = 'center';
  lctx.textBaseline = 'middle';
  if (!noBg) {
    const w = lctx.measureText(text).width;
    const h = (size||11) * 1.1;
    const pad = 3;
    lctx.fillStyle = T().labelBg;
    lctx.beginPath();
    lctx.roundRect(p.x - w/2 - pad, p.y - h/2 - pad, w + pad*2, h + pad*2, 3);
    lctx.fill();
  }
  lctx.fillStyle = col;
  lctx.fillText(text, p.x, p.y);
}

function v3(arr) { return new THREE.Vector3(arr[0], arr[1], arr[2]); }
function add3(a,b) { return [a[0]+b[0], a[1]+b[1], a[2]+b[2]]; }

/* helpers to add geometry into dynGroup */
function addTubeSegment(a, b, color, opacity, r) {
  const A3 = v3(a), B3 = v3(b);
  const dir = B3.clone().sub(A3);
  const len = dir.length();
  if (len < 1e-6) return;
  const mat = new THREE.MeshBasicMaterial({ color, transparent: opacity < 1, opacity });
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 6), mat);
  mesh.position.copy(A3.clone().add(B3).multiplyScalar(0.5));
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  _dg().add(mesh);
}
function addLines(pointPairs, color, opacity = 1, r = 0.03) {
  pointPairs.forEach(([a, b]) => addTubeSegment(a, b, color, opacity, r));
}
function addDashedLines(pointPairs, color, opacity = 1, r = 0.02, dashLen = 0.35, gapLen = 0.25) {
  pointPairs.forEach(([a, b]) => {
    const A3 = v3(a), B3 = v3(b);
    const dir = B3.clone().sub(A3);
    const total = dir.length();
    if (total < 1e-6) return;
    const unit = dir.clone().normalize();
    let t = 0;
    while (t < total) {
      const segEnd = Math.min(t + dashLen, total);
      const start = A3.clone().add(unit.clone().multiplyScalar(t));
      const end   = A3.clone().add(unit.clone().multiplyScalar(segEnd));
      addTubeSegment(start.toArray(), end.toArray(), color, opacity, r);
      t = segEnd + gapLen;
    }
  });
}

function addFace(verts, color, alpha) {
  /* verts = array of [x,y,z], convex polygon triangulated as fan */
  const cx = verts.reduce((s,v) => s+v[0], 0) / verts.length;
  const cy = verts.reduce((s,v) => s+v[1], 0) / verts.length;
  const cz = verts.reduce((s,v) => s+v[2], 0) / verts.length;
  const positions = [];
  for (let i = 1; i < verts.length - 1; i++) {
    positions.push(verts[0][0]-cx, verts[0][1]-cy, verts[0][2]-cz,
                   verts[i][0]-cx, verts[i][1]-cy, verts[i][2]-cz,
                   verts[i+1][0]-cx, verts[i+1][1]-cy, verts[i+1][2]-cz);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshLambertMaterial({
    color, transparent: true, opacity: alpha,
    side: THREE.DoubleSide, depthWrite: alpha > 0.9
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(cx, cy, cz);
  _dg().add(mesh);
}

function drawBBox() {
  const W=A[0]+B[0]+C[0], H=A[1]+B[1]+C[1], D=A[2]+B[2]+C[2];
  const p = [
    [0,0,0],[W,0,0],[0,H,0],[0,0,D],
    [W,H,0],[W,0,D],[0,H,D],[W,H,D]
  ];
  addDashedLines([
    [p[0],p[1]],[p[0],p[2]],[p[0],p[3]],
    [p[1],p[4]],[p[1],p[5]],[p[2],p[4]],[p[2],p[6]],
    [p[3],p[5]],[p[3],p[6]],[p[4],p[7]],[p[5],p[7]],[p[6],p[7]]
  ], T().bbox, SZ.bboxOpacity, SZ.bboxR, SZ.bboxDash, SZ.bboxGap);
  /* bbox vertex labels */
  const colHex = '#' + T().bbox.toString(16).padStart(6,'0');
  const vertNames = ['O','W','H','D','WH','WD','HD','WHD'];
  return p.map((pt,i) => ({ pos: pt, text: vertNames[i], col: colHex, size: 11 }));
}

function drawParallelepiped() {
  const O=[0,0,0];
  const AB=add3(A,B), AC=add3(A,C), BC=add3(B,C), ABC=add3(AB,C);
  addFace([O,A,AB,B],   0xe74c3c, 0.08);
  addFace([O,A,AC,C],   0xe74c3c, 0.07);
  addFace([O,B,BC,C],   0x2ecc71, 0.07);
  addFace([A,AB,ABC,AC],0x3498db, 0.08);
  addFace([B,AB,ABC,BC],0x3498db, 0.07);
  addFace([C,AC,ABC,BC],0x2ecc71, 0.08);
  // edges parallel to a → red
  addLines([[O,A],[B,AB],[C,AC],[BC,ABC]], 0xe74c3c, 0.9, SZ.edgeR);
  // edges parallel to b → green
  addLines([[O,B],[A,AB],[C,BC],[AC,ABC]], 0x2ecc71, 0.9, SZ.edgeR);
  // edges parallel to c → blue
  addLines([[O,C],[A,AC],[B,BC],[AB,ABC]], 0x3498db, 0.9, SZ.edgeR);
  /* arrows for a, b, c */
  [[A,'#e74c3c'],[B,'#2ecc71'],[C,'#3498db']].forEach(([v, col]) => {
    const arrow = makeArrow(v, parseInt(col.replace('#',''), 16), Math.hypot(...v), SZ.vecR, false);
    dynGroup.add(arrow);
  });
  /* parallelepiped vertex labels */
  return [
    { pos: O,   text:'O',     col:'#f1c40f', bold:true, size:12 },
    { pos: A,   text:'a',     col:'#e74c3c', bold:true, size:12 },
    { pos: B,   text:'b',     col:'#2ecc71', bold:true, size:12 },
    { pos: C,   text:'c',     col:'#3498db', bold:true, size:12 },
    { pos: AB,  text:'a+b',   col:'#ccc',    size:11 },
    { pos: AC,  text:'a+c',   col:'#ccc',    size:11 },
    { pos: BC,  text:'b+c',   col:'#ccc',    size:11 },
    { pos: ABC, text:'a+b+c', col:'#ccc',    size:11 },
  ];
}

function drawBox(p1, p2, color, alpha) {
  const x0=Math.min(p1[0],p2[0]), x1=Math.max(p1[0],p2[0]);
  const y0=Math.min(p1[1],p2[1]), y1=Math.max(p1[1],p2[1]);
  const z0=Math.min(p1[2],p2[2]), z1=Math.max(p1[2],p2[2]);
  const c = [
    [x0,y0,z0],[x1,y0,z0],[x0,y1,z0],[x0,y0,z1],
    [x1,y1,z0],[x1,y0,z1],[x0,y1,z1],[x1,y1,z1]
  ];
  [[c[0],c[1],c[4],c[2]],[c[3],c[5],c[7],c[6]],
   [c[0],c[1],c[5],c[3]],[c[2],c[4],c[7],c[6]],
   [c[0],c[2],c[6],c[3]],[c[1],c[4],c[7],c[5]]
  ].forEach(f => addFace(f, color, alpha));
  addLines([
    [c[0],c[1]],[c[0],c[2]],[c[0],c[3]],[c[1],c[4]],[c[1],c[5]],
    [c[2],c[4]],[c[2],c[6]],[c[3],c[5]],[c[3],c[6]],
    [c[4],c[7]],[c[5],c[7]],[c[6],c[7]]
  ], color, Math.min(alpha * 4, 0.9), SZ.edgeR);
  return c;
}

function drawPrism(top4, bot4, color, alpha) {
  addFace(top4, color, alpha);
  addFace([...bot4].reverse(), color, alpha);
  for (let i = 0; i < 4; i++) {
    const j = (i + 1) % 4;
    addFace([top4[i], top4[j], bot4[j], bot4[i]], color, alpha);
  }
  const pairs = [];
  for (let i = 0; i < 4; i++) {
    pairs.push([top4[i], top4[(i+1)%4]]);
    pairs.push([bot4[i], bot4[(i+1)%4]]);
    pairs.push([top4[i], bot4[i]]);
  }
  addLines(pairs, color, Math.min(alpha * 4, 0.9), SZ.edgeR);
}

function drawPyramid(apex, base4, color, alpha) {
  addFace(base4, color, alpha);
  for (let i = 0; i < 4; i++)
    addFace([apex, base4[i], base4[(i+1)%4]], color, alpha);
  const pairs = [];
  for (let i = 0; i < 4; i++) {
    pairs.push([base4[i], base4[(i+1)%4]]);
    pairs.push([apex, base4[i]]);
  }
  addLines(pairs, color, Math.min(alpha * 4, 0.9), SZ.edgeR);
}

let dynLabels = [];

function boxCenter() {
  return new THREE.Vector3(
    (A[0]+B[0]+C[0]) / 2,
    (A[1]+B[1]+C[1]) / 2,
    (A[2]+B[2]+C[2]) / 2
  );
}

function rebuild() {
  applyNzFilter();
  dynGroup.clear();
  dynLabels = [];
  dynLabels.push(...drawBBox());

  const W=A[0]+B[0]+C[0], H=A[1]+B[1]+C[1], D=A[2]+B[2]+C[2];

  /* ── grid planes ── */
  if (showMode === 'cubes') {
    const planeAlpha = 0.18;
    const edgeAlpha = 0.7;
    const edgeR = 0.016;
    const gc = 0xd4c060;
    const xs = [0, A[0], A[0]+B[0], W];
    const ys = [0, A[1], A[1]+B[1], H];
    const zs = [0, A[2], A[2]+B[2], D];
    // 6 planes
    [xs[1], xs[2]].forEach(x => {
      addFace([[x,0,0],[x,H,0],[x,H,D],[x,0,D]], gc, planeAlpha);
    });
    [ys[1], ys[2]].forEach(y => {
      addFace([[0,y,0],[W,y,0],[W,y,D],[0,y,D]], gc, planeAlpha);
    });
    [zs[1], zs[2]].forEach(z => {
      addFace([[0,0,z],[W,0,z],[W,H,z],[0,H,z]], gc, planeAlpha);
    });
    // all grid edges: x-parallel lines at every (yj,zk) except the 4 bbox x-edges
    for (let j=0; j<4; j++) for (let k=0; k<4; k++) {
      if ((j===0||j===3)&&(k===0||k===3)) continue;
      addLines([[[xs[0],ys[j],zs[k]],[xs[3],ys[j],zs[k]]]], gc, edgeAlpha, edgeR);
    }
    // y-parallel lines
    for (let i=0; i<4; i++) for (let k=0; k<4; k++) {
      if ((i===0||i===3)&&(k===0||k===3)) continue;
      addLines([[[xs[i],ys[0],zs[k]],[xs[i],ys[3],zs[k]]]], gc, edgeAlpha, edgeR);
    }
    // z-parallel lines
    for (let i=0; i<4; i++) for (let j=0; j<4; j++) {
      if ((i===0||i===3)&&(j===0||j===3)) continue;
      addLines([[[xs[i],ys[j],zs[0]],[xs[i],ys[j],zs[3]]]], gc, edgeAlpha, edgeR);
    }
    // selected cube highlight
    if (selCube) {
      const vi = ['a','b','c'];
      const xi = vi.indexOf(selCube.xv), yi = vi.indexOf(selCube.yv), zi = vi.indexOf(selCube.zv);
      const x0=xs[xi], x1=xs[xi+1], y0=ys[yi], y1=ys[yi+1], z0=zs[zi], z1=zs[zi+1];
      const hc = 0xffffff;
      addFace([[x0,y0,z0],[x1,y0,z0],[x1,y1,z0],[x0,y1,z0]], hc, 0.18);
      addFace([[x0,y0,z1],[x1,y0,z1],[x1,y1,z1],[x0,y1,z1]], hc, 0.18);
      addFace([[x0,y0,z0],[x1,y0,z0],[x1,y0,z1],[x0,y0,z1]], hc, 0.18);
      addFace([[x0,y1,z0],[x1,y1,z0],[x1,y1,z1],[x0,y1,z1]], hc, 0.18);
      addFace([[x0,y0,z0],[x0,y1,z0],[x0,y1,z1],[x0,y0,z1]], hc, 0.18);
      addFace([[x1,y0,z0],[x1,y1,z0],[x1,y1,z1],[x1,y0,z1]], hc, 0.18);
      addLines([
        [[x0,y0,z0],[x1,y0,z0]],[[x1,y0,z0],[x1,y1,z0]],[[x1,y1,z0],[x0,y1,z0]],[[x0,y1,z0],[x0,y0,z0]],
        [[x0,y0,z1],[x1,y0,z1]],[[x1,y0,z1],[x1,y1,z1]],[[x1,y1,z1],[x0,y1,z1]],[[x0,y1,z1],[x0,y0,z1]],
        [[x0,y0,z0],[x0,y0,z1]],[[x1,y0,z0],[x1,y0,z1]],[[x1,y1,z0],[x1,y1,z1]],[[x0,y1,z0],[x0,y1,z1]]
      ], hc, 0.9, 0.02);
    }
  }
  const alpha = gAlpha();
  const dc = T().dc;
  const anyEyeOn = eyeState.a || eyeState.b || eyeState.c || eyeState.pyr || eyeState.pyrb || eyeState.pyrc || eyeState.prismab || eyeState.prismbc || eyeState.prismac || eyeState.bridges || eyeState.prismb1;
  const bridgeGroups = ['bridge','bridge1','bridgebc','bridgeb2c2','bridgea1b2','bridgeb1a2'];
  const b1b2Groups = ['bridge','bridge1'];
  const bc1b2c2Groups = ['bridgebc','bridgeb2c2'];
  function isEyeOn(g) {
    if (bridgeGroups.includes(g)) return eyeState.bridges || (b1b2Groups.includes(g) && eyeState.prismb1);
    return eyeState[g];
  }
  function isHovered(g) {
    return g === hoverGroup
      || (hoverGroup === 'bridges' && bridgeGroups.includes(g))
      || (hoverGroup === 'prismb1'  && b1b2Groups.includes(g))
      || (hoverGroup === 'prismbc1' && bc1b2c2Groups.includes(g));
  }
  function isDimmed(g) { return anyEyeOn ? !isEyeOn(g) : dimBoxes; }
  function boxCol(col, g) { return isDimmed(g) ? dc : col; }
  function boxAlpha(g)    { const a = isDimmed(g) ? alpha * 0.1 : alpha; return isHovered(g) ? Math.min(a * 1.8, 0.7) : a; }
  function edgeR(g)       { return isDimmed(g) ? SZ.edgeR : SZ.edgeR * 1.4; }
  function edgeA(g)       { const a = isDimmed(g) ? alpha * 0.3 : 1.0; return isHovered(g) ? Math.min(a * 1.3, 1.0) : a; }

  function colorABoxEdges(verts, rev=false) {
    const d = isDimmed('a');
    [[verts[0],verts[1]], [verts[2],verts[4]], [verts[3],verts[5]], [verts[6],verts[7]]].forEach(([ea,eb]) => {
      const mid = [ea[0]+(rev ? C[0] : B[0]), ea[1], ea[2]];
      addLines([[ea, mid]], d ? dc : (rev ? 0x3498db : 0x2ecc71), edgeA('a'), edgeR('a'));
      addLines([[mid, eb]], d ? dc : (rev ? 0x2ecc71 : 0x3498db), edgeA('a'), edgeR('a'));
    });
    addLines([
      [verts[0],verts[2]], [verts[1],verts[4]], [verts[3],verts[6]], [verts[5],verts[7]],
      [verts[0],verts[3]], [verts[1],verts[5]], [verts[2],verts[6]], [verts[4],verts[7]],
    ], d ? dc : 0xe74c3c, edgeA('a'), edgeR('a'));
  }

  if (tog('show-abox')) {
    const verts = drawBox(A, [W,0,0], boxCol(0xb43232,'a'), boxAlpha('a'));
    if (tog('show-edge-parts')) colorABoxEdges(verts);
  }
  if (tog('show-abox2')) {
    const verts = drawBox(add3(B,C), [0,H,D], boxCol(0xb43232,'a'), boxAlpha('a'));
    if (tog('show-edge-parts')) colorABoxEdges(verts, true);
    verts.forEach((v,i) => dynLabels.push({ pos: v, text: String(i), col: '#e74c3c', size: 10 }));
  }

  function colorBBoxEdges(verts, rev=false) {
    const d = isDimmed('b');

function rebuildRight() {
  if (!dynGroup2) return;
  dynGroup2.clear();
  _tgt = dynGroup2;
  drawBBox();
  const W=A[0]+B[0]+C[0], H=A[1]+B[1]+C[1], D=A[2]+B[2]+C[2];
  const xs=[0,A[0],A[0]+B[0],W], ys=[0,A[1],A[1]+B[1],H], zs=[0,A[2],A[2]+B[2],D];
  const gc=0xd4c060;
  [xs[1],xs[2]].forEach(x=>{addFace([[x,0,0],[x,H,0],[x,H,D],[x,0,D]],gc,0.07);});
  [ys[1],ys[2]].forEach(y=>{addFace([[0,y,0],[W,y,0],[W,y,D],[0,y,D]],gc,0.07);});
  [zs[1],zs[2]].forEach(z=>{addFace([[0,0,z],[W,0,z],[W,H,z],[0,H,z]],gc,0.07);});
  for(let j=0;j<4;j++)for(let k=0;k<4;k++){if((j===0||j===3)&&(k===0||k===3))continue;addLines([[[xs[0],ys[j],zs[k]],[xs[3],ys[j],zs[k]]]],gc,0.4,0.008);}
  for(let i=0;i<4;i++)for(let k=0;k<4;k++){if((i===0||i===3)&&(k===0||k===3))continue;addLines([[[xs[i],ys[0],zs[k]],[xs[i],ys[3],zs[k]]]],gc,0.4,0.008);}
  for(let i=0;i<4;i++)for(let j=0;j<4;j++){if((i===0||i===3)&&(j===0||j===3))continue;addLines([[[xs[i],ys[j],zs[0]],[xs[i],ys[j],zs[3]]]],gc,0.4,0.008);}
  if (selCube) {
    const vi = ['a','b','c'];
    const xi=vi.indexOf(selCube.xv), yi=vi.indexOf(selCube.yv), zi=vi.indexOf(selCube.zv);
    const x0=xs[xi],x1=xs[xi+1],y0=ys[yi],y1=ys[yi+1],z0=zs[zi],z1=zs[zi+1];
    const hc=0xffffff;
    addFace([[x0,y0,z0],[x1,y0,z0],[x1,y1,z0],[x0,y1,z0]],hc,0.18);
    addFace([[x0,y0,z1],[x1,y0,z1],[x1,y1,z1],[x0,y1,z1]],hc,0.18);
    addFace([[x0,y0,z0],[x1,y0,z0],[x1,y0,z1],[x0,y0,z1]],hc,0.18);
    addFace([[x0,y1,z0],[x1,y1,z0],[x1,y1,z1],[x0,y1,z1]],hc,0.18);
    addFace([[x0,y0,z0],[x0,y1,z0],[x0,y1,z1],[x0,y0,z1]],hc,0.18);
    addFace([[x1,y0,z0],[x1,y1,z0],[x1,y1,z1],[x1,y0,z1]],hc,0.18);
    addLines([
      [[x0,y0,z0],[x1,y0,z0]],[[x1,y0,z0],[x1,y1,z0]],[[x1,y1,z0],[x0,y1,z0]],[[x0,y1,z0],[x0,y0,z0]],
      [[x0,y0,z1],[x1,y0,z1]],[[x1,y0,z1],[x1,y1,z1]],[[x1,y1,z1],[x0,y1,z1]],[[x0,y1,z1],[x0,y0,z1]],
      [[x0,y0,z0],[x0,y0,z1]],[[x1,y0,z0],[x1,y0,z1]],[[x1,y1,z0],[x1,y1,z1]],[[x0,y1,z0],[x0,y1,z1]]
    ],hc,0.9,0.02);
  }
  drawParallelepiped();
  _tgt = null;
}

rebuild();

/* ── render loop ── */
function drawDynLabels() {
  dynLabels.forEach(l => {
    if (!/^\d+$/.test(l.text)) {
      const p = worldToScreen(new THREE.Vector3(...l.pos));
      drawLabel(p, l.text, l.col, l.bold, l.size);
    }
  });
}

function setCamAspect(camera, vW, vH) {
  const a = vW / vH;
  camera.left   = -frustum * a / 2;
  camera.right  =  frustum * a / 2;
  camera.top    =  frustum / 2;
  camera.bottom = -frustum / 2;
  camera.updateProjectionMatrix();
}

function resize() {
  const W = sceneW(), H = window.innerHeight;
  renderer.setSize(W, H);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  labelCanvas.width  = Math.round(W * devicePixelRatio);
  labelCanvas.height = Math.round(H * devicePixelRatio);
  labelCanvas.style.width  = W + 'px';
  labelCanvas.style.height = H + 'px';
  lctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  if (showMode === 'formula') {
    const vW = Math.floor(W / 2), vH = H;
    setCamAspect(cam, vW, vH);
    if (cam2) setCamAspect(cam2, vW, vH);
  } else {
    setCamAspect(cam, W, H);
  }
}
window.addEventListener('resize', resize);
resize();

/* ── theme toggle ── */
function applyTheme() {
  document.body.classList.toggle('light', !darkMode);
  renderer.setClearColor(T().bg);
  buildAxes();
  document.getElementById('detval').style.color = '#' + T().bbox.toString(16).padStart(6,'0');
  try { localStorage.setItem(THEME_KEY, darkMode ? 'dark' : 'light'); } catch(e) {}
  document.getElementById('theme-toggle').textContent = darkMode ? '☀' : '🌙';
  rebuild();
  updateFormulas();
  renderVecPanel();
}
document.getElementById('theme-toggle').addEventListener('click', () => {
  darkMode = !darkMode;
  applyTheme();
});
applyTheme();

/* ── sidebar resize handle ── */
(function() {
  const handle = document.getElementById('sb-handle');
  const formulas = document.getElementById('formulas');
  function applyWidth(w) {
    SBW = Math.max(160, Math.min(600, w));
    formulas.style.width = SBW + 'px';
    try { localStorage.setItem('det3d_sbw', SBW); } catch(e) {}
    resize();
  }
  applyWidth(SBW);
  let startX, startW;
  handle.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = SBW;
    handle.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
  function onMove(e) { applyWidth(startW + startX - e.clientX); }
  function onUp() {
    handle.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
})();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  if (showMode === 'formula' && scene2 && cam2) {
    const W = sceneW(), H = window.innerHeight;
    const vW = Math.floor(W / 2);
    // sync cam2 to cam
    cam2.position.copy(cam.position);
    cam2.quaternion.copy(cam.quaternion);
    cam2.zoom = cam.zoom;
    cam2.updateProjectionMatrix();
    // render left (figures)
    renderer.autoClear = false;
    renderer.setScissorTest(true);
    renderer.setViewport(0, 0, vW, H);
    renderer.setScissor(0, 0, vW, H);
    renderer.setClearColor(T().bg);
    renderer.clear();
    renderer.render(scene, cam);
    // render right (cubes)
    renderer.setViewport(vW, 0, vW, H);
    renderer.setScissor(vW, 0, vW, H);
    renderer.setClearColor(T().bg);
    renderer.clear();
    renderer.render(scene2, cam2);
    renderer.autoClear = true;
    renderer.setScissorTest(false);
    renderer.setViewport(0, 0, W, H);
    // divider
    const divider = document.getElementById('scene-divider');
    divider.style.display = 'block';
    divider.style.left = vW + 'px';
    lctx.clearRect(0, 0, labelCanvas.width, labelCanvas.height);
    // scene labels (left half only)
    drawLabels();
  } else {
    document.getElementById('scene-divider').style.display = 'none';
    renderer.setScissorTest(false);
    renderer.render(scene, cam);
    drawLabels();
    drawDynLabels();
  }
}
animate();
</script>
