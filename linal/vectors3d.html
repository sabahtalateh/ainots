<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Векторы в 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; overflow: hidden; }

  #canvas-container { position: fixed; inset: 0; }

  #panel {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 16px;
    width: 220px;
    backdrop-filter: blur(8px);
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }

  #panel h3 {
    font-size: 12px;
    color: #777;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .section-divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin: 12px 0;
  }

  /* 4-column grid: name | x | y | z */
  .vec-table {
    display: grid;
    grid-template-columns: 26px 1fr 1fr 1fr;
    gap: 4px;
    align-items: center;
  }

  .vec-table .col-header {
    font-size: 10px;
    color: #444;
    text-align: center;
  }

  .vec-table .vec-name {
    font-size: 13px;
    font-weight: bold;
    text-align: right;
    padding-right: 2px;
  }

  .vec-table input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px;
    color: #e0e0e0;
    font-family: monospace;
    font-size: 12px;
    padding: 4px 2px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .vec-table input:focus { border-color: rgba(255,255,255,0.4); }

  .vec-table .result-val {
    font-size: 11px;
    color: #c8f0c8;
    text-align: center;
    padding: 3px 2px;
    background: rgba(100,255,100,0.06);
    border: 1px solid rgba(100,255,100,0.12);
    border-radius: 5px;
  }

  #hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    pointer-events: none;
    white-space: nowrap;
  }

  #btn-rotate {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #aaa;
    font-family: monospace;
    font-size: 12px;
    padding: 7px 14px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s, color 0.2s;
  }
  #btn-rotate:hover { border-color: rgba(255,255,255,0.35); color: #eee; }
  #btn-rotate.active { border-color: #ff9f43; color: #ff9f43; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="panel">
  <h3>Вектор (v)</h3>
  <div class="vec-table">
    <span></span>
    <span class="col-header">x</span>
    <span class="col-header">y</span>
    <span class="col-header">z</span>

    <span class="vec-name" style="color:#ff9f43">v</span>
    <input type="number" id="wx" value="1" step="0.5">
    <input type="number" id="wy" value="1" step="0.5">
    <input type="number" id="wz" value="1" step="0.5">
  </div>

  <hr class="section-divider">
  <h3>Матрица (T)</h3>
  <div class="vec-table">
    <span></span>
    <span class="col-header">x</span>
    <span class="col-header">y</span>
    <span class="col-header">z</span>

    <span class="vec-name" style="color:#8888aa">t₁</span>
    <input type="number" id="v1x" value="1" step="0.5">
    <input type="number" id="v1y" value="0" step="0.5">
    <input type="number" id="v1z" value="0" step="0.5">

    <span class="vec-name" style="color:#8888aa">t₂</span>
    <input type="number" id="v2x" value="0" step="0.5">
    <input type="number" id="v2y" value="1" step="0.5">
    <input type="number" id="v2z" value="0" step="0.5">

    <span class="vec-name" style="color:#8888aa">t₃</span>
    <input type="number" id="v3x" value="0" step="0.5">
    <input type="number" id="v3y" value="0" step="0.5">
    <input type="number" id="v3z" value="1" step="0.5">
  </div>

  <hr class="section-divider">
  <h3>Результат (Tv)</h3>
  <div class="vec-table">
    <span></span>
    <span class="col-header">x</span>
    <span class="col-header">y</span>
    <span class="col-header">z</span>

    <span class="vec-name" style="color:#a0ffa0">r</span>
    <span class="result-val" id="rx">0</span>
    <span class="result-val" id="ry">0</span>
    <span class="result-val" id="rz">0</span>
  </div>
</div>

<div id="hint">ЛКМ — вращение &nbsp;·&nbsp; Колесо — зум &nbsp;·&nbsp; ПКМ — перемещение</div>
<button id="btn-rotate">⟳ вращение Z</button>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(4, 3, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lights (stay in scene, not worldGroup)
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 8, 5);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.4);
dirLight2.position.set(-4, -2, -3);
scene.add(dirLight2);

// World group — everything except lights goes here so we can rotate it
const worldGroup = new THREE.Group();
scene.add(worldGroup);

// Grid & axes
worldGroup.add(new THREE.GridHelper(10, 10, 0x333355, 0x222244));

const axesMat = (c) => new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.4 });
const axisLine = (a, b, c) => {
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...a), new THREE.Vector3(...b)]);
  return new THREE.Line(g, axesMat(c));
};
// X=red, Y(up)=blue labeled z, Z(depth)=green labeled y
worldGroup.add(axisLine([-5,0,0],[5,0,0], 0xff4444));
worldGroup.add(axisLine([0,-5,0],[0,5,0], 0x4444ff));
worldGroup.add(axisLine([0,0,-5],[0,0,5], 0x44ff44));

const makeLabel = (text, pos, color) => {
  const cv = document.createElement('canvas');
  cv.width = 64; cv.height = 64;
  const ctx = cv.getContext('2d');
  ctx.font = 'bold 40px monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 32, 32);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, opacity: 0.6 }));
  s.scale.set(0.4, 0.4, 1);
  s.position.set(...pos);
  return s;
};
worldGroup.add(makeLabel('x',[5.3,0,0],'#ff6666'));
worldGroup.add(makeLabel('z',[0,5.3,0],'#6666ff'));
worldGroup.add(makeLabel('y',[0,0,5.3],'#66ff66'));

worldGroup.add(new THREE.Mesh(
  new THREE.SphereGeometry(0.06, 16, 16),
  new THREE.MeshPhongMaterial({ color: 0xffffff, opacity: 0.6, transparent: true })
));

// ThickArrow
const HEAD_LEN = 0.28;
const Y_AXIS   = new THREE.Vector3(0, 1, 0);

class ThickArrow extends THREE.Group {
  constructor(color, { shaftR = 0.04, headR = 0.11, opacity = 1 } = {}) {
    super();
    const mat = new THREE.MeshPhongMaterial({
      color, shininess: 80,
      transparent: opacity < 1, opacity,
    });
    this.shaft = new THREE.Mesh(new THREE.CylinderGeometry(shaftR, shaftR, 1, 14), mat);
    this.head  = new THREE.Mesh(new THREE.ConeGeometry(headR, 1, 16), mat);
    this.add(this.shaft, this.head);
  }

  update(vec) {
    const len = vec.length();
    if (len < 0.001) { this.visible = false; return; }
    this.visible = true;

    const headLen  = Math.min(HEAD_LEN, len * 0.35);
    const shaftLen = Math.max(0.001, len - headLen);

    this.shaft.scale.y = shaftLen;
    this.shaft.position.y = shaftLen / 2;
    this.head.scale.y = headLen;
    this.head.position.y = shaftLen + headLen / 2;

    const dir = vec.clone().normalize();
    const dot = dir.dot(Y_AXIS);
    if (dot > 0.9999)       this.quaternion.identity();
    else if (dot < -0.9999) this.quaternion.setFromAxisAngle(new THREE.Vector3(1,0,0), Math.PI);
    else                    this.quaternion.setFromUnitVectors(Y_AXIS, dir);
  }
}

// T arrows (matrix columns, grey semi-transparent)
const V_COLORS       = [0x8888aa, 0x8888aa, 0x8888aa];
const V_LABEL_TEXTS  = ['t₁', 't₂', 't₃'];
const V_LABEL_COLORS = ['#8888aa', '#8888aa', '#8888aa'];

const vArrows = [], vLabels = [];

// V arrow (input vector, coloured)
const wArrow = new ThickArrow(0xff9f43, { shaftR: 0.06, headR: 0.15, opacity: 1 });
worldGroup.add(wArrow);

// Result arrow (Tv)
const rArrow = new ThickArrow(0x80ff80, { shaftR: 0.05, headR: 0.13, opacity: 0.9 });
worldGroup.add(rArrow);

const makeSpriteLabel = (text, color) => {
  const cv = document.createElement('canvas');
  cv.width = 128; cv.height = 64;
  const ctx = cv.getContext('2d');
  ctx.font = 'bold 44px monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 64, 32);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true }));
  s.scale.set(0.5, 0.25, 1);
  worldGroup.add(s);
  return s;
};

for (let i = 0; i < 3; i++) {
  const va = new ThickArrow(V_COLORS[i], { shaftR: 0.04, headR: 0.11, opacity: 0.45 });
  worldGroup.add(va);
  vArrows.push(va);
  vLabels.push(makeSpriteLabel(V_LABEL_TEXTS[i], V_LABEL_COLORS[i]));
}

const wLabel = makeSpriteLabel('v', '#ff9f43');
const rLabel = makeSpriteLabel('Tv', '#80ff80');

// Input ids
const V_IDS = [['v1x','v1y','v1z'],['v2x','v2y','v2z'],['v3x','v3y','v3z']];

const getVec = (xi, yi, zi) => new THREE.Vector3(
  parseFloat(document.getElementById(xi).value) || 0,
  parseFloat(document.getElementById(zi).value) || 0,  // input z → Three.js Y (vertical, labeled Z)
  parseFloat(document.getElementById(yi).value) || 0,  // input y → Three.js Z (depth, labeled Y)
);

// localStorage
const STORAGE_KEY = 'vectors3d_v3';

function saveToStorage() {
  const ids = [...V_IDS.flat(), 'wx','wy','wz'];
  const data = {};
  ids.forEach(id => { data[id] = document.getElementById(id).value; });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadFromStorage() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    Object.entries(data).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el) el.value = val;
    });
  } catch {}
}

function fmt(n) { return n.toFixed(2).replace(/\.?0+$/, '') || '0'; }

function updateLabelPos(sprite, vec) {
  if (vec.length() > 0.001) {
    sprite.visible = true;
    sprite.position.copy(vec).addScaledVector(vec.clone().normalize(), 0.28);
  } else {
    sprite.visible = false;
  }
}

function updateScene() {
  // Matrix columns
  const v = V_IDS.map(([xi,yi,zi]) => getVec(xi,yi,zi));
  for (let i = 0; i < 3; i++) {
    vArrows[i].update(v[i]);
    updateLabelPos(vLabels[i], v[i]);
  }

  // Input vector w
  const w = getVec('wx','wy','wz');
  wArrow.update(w);
  updateLabelPos(wLabel, w);

  // Result: r = w.x*v1 + w.y*v2 + w.z*v3  (matrix-vector product, columns = v)
  const r = new THREE.Vector3()
    .addScaledVector(v[0], w.x)
    .addScaledVector(v[1], w.y)
    .addScaledVector(v[2], w.z);

  rArrow.update(r);
  updateLabelPos(rLabel, r);

  document.getElementById('rx').textContent = fmt(r.x);
  document.getElementById('ry').textContent = fmt(r.z);  // Three.js Z = labeled Y
  document.getElementById('rz').textContent = fmt(r.y);  // Three.js Y = labeled Z

  saveToStorage();
}

loadFromStorage();
document.querySelectorAll('input[type=number]').forEach(inp => inp.addEventListener('input', updateScene));
updateScene();

// Rotation toggle
let rotating = false;
const btnRotate = document.getElementById('btn-rotate');
btnRotate.addEventListener('click', () => {
  rotating = !rotating;
  btnRotate.classList.toggle('active', rotating);
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

(function animate() {
  requestAnimationFrame(animate);
  if (rotating) worldGroup.rotation.y += 0.008;
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
