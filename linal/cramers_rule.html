<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" onload="scenes.forEach(s => s.draw()); updateFormula()"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; overflow: hidden; display: flex; }
  .panel { position: relative; flex: 1; }
  #panel-right { border-left: 2px solid #666; }
  canvas { display: block; }
  #system {
    position: fixed;
    top: 24px;
    left: 24px;
    color: #ccc;
    pointer-events: none;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px 18px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .mat-row { display: flex; align-items: center; gap: 10px; font-size: 15px; font-family: serif; }
  .mat-wrap { display: flex; align-items: stretch; gap: 2px; }
  .mat-bracket {
    width: 7px;
    border-top: 2px solid #888;
    border-bottom: 2px solid #888;
  }
  .mat-bracket.left  { border-left:  2px solid #888; border-radius: 3px 0 0 3px; }
  .mat-bracket.right { border-right: 2px solid #888; border-radius: 0 3px 3px 0; }
  .mat-cells { display: grid; gap: 3px 10px; padding: 4px 3px; align-items: center; }
  .mat-cells.cols2 { grid-template-columns: 1fr 1fr; }
  .mat-cells.cols1 { grid-template-columns: 1fr; }
  input.mat-in {
    width: 36px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #555;
    color: inherit;
    font-size: 15px;
    font-family: serif;
    text-align: center;
    outline: none;
    padding: 1px 2px;
    pointer-events: auto;
    -moz-appearance: textfield;
  }
  input.mat-in::-webkit-outer-spin-button,
  input.mat-in::-webkit-inner-spin-button { -webkit-appearance: none; }
  input.mat-in:focus { border-bottom-color: #888; }
  .mat-cell { display: flex; align-items: center; gap: 2px; }
  .spin-btns { display: flex; flex-direction: column; gap: 1px; }
  .spin-btn {
    width: 14px; height: 12px; font-size: 9px; line-height: 1;
    background: rgba(255,255,255,0.08); color: #888;
    border: 1px solid #444; border-radius: 3px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    pointer-events: auto; user-select: none;
  }
  .spin-btn:hover { background: rgba(255,255,255,0.18); color: #ccc; }
  .zoom-bar { display: flex; gap: 6px; pointer-events: auto; }
  .zoom-btn {
    width: 30px; height: 30px; font-size: 18px;
    background: rgba(255,255,255,0.07); color: #aaa;
    border: 1px solid #444; border-radius: 6px;
    cursor: pointer; line-height: 1;
  }
  .vec-label { position: absolute; pointer-events: none; transform: translate(10px, -50%); }
  .katex { font-size: 14px; }
  #formula-box .katex { font-size: 17px; }
</style>
</head>
<body>

<div id="system">
  <div class="mat-row">
    <span>A =</span>
    <div class="mat-wrap">
      <div class="mat-bracket left"></div>
      <div class="mat-cells" style="grid-template-columns: auto 1fr auto 1fr;">
        <span style="color:#e05c3a; font-size:11px; font-family:serif; white-space:nowrap;">t<sub>11</sub>:</span>
        <input class="mat-in" id="a11" type="number" value="2"  style="color:#e05c3a">
        <span style="color:#5ca8e0; font-size:11px; font-family:serif; white-space:nowrap;">t<sub>21</sub>:</span>
        <input class="mat-in" id="a12" type="number" value="-1" style="color:#5ca8e0">
        <span style="color:#e05c3a; font-size:11px; font-family:serif; white-space:nowrap;">t<sub>12</sub>:</span>
        <input class="mat-in" id="a21" type="number" value="0"  style="color:#e05c3a">
        <span style="color:#5ca8e0; font-size:11px; font-family:serif; white-space:nowrap;">t<sub>22</sub>:</span>
        <input class="mat-in" id="a22" type="number" value="1"  style="color:#5ca8e0">
      </div>
      <div class="mat-bracket right"></div>
    </div>

    <span style="color:#a0ff80">a =</span>
    <div class="mat-wrap">
      <div class="mat-bracket left"></div>
      <div class="mat-cells cols1" style="color:#a0ff80; padding: 4px 6px; font-style:italic;">
        <span>x</span><span>y</span>
      </div>
      <div class="mat-bracket right"></div>
    </div>

    <span style="color:#f0d060">b =</span>
    <div class="mat-wrap">
      <div class="mat-bracket left"></div>
      <div class="mat-cells" style="grid-template-columns: auto 1fr;">
        <span style="color:#f0d060; font-size:11px; font-family:serif; white-space:nowrap;">b<sub>1</sub>:</span>
        <input class="mat-in" id="b1" type="number" value="4" style="color:#f0d060">
        <span style="color:#f0d060; font-size:11px; font-family:serif; white-space:nowrap;">b<sub>2</sub>:</span>
        <input class="mat-in" id="b2" type="number" value="2" style="color:#f0d060">
      </div>
      <div class="mat-bracket right"></div>
    </div>
  </div>

  <div class="zoom-bar">
    <button class="zoom-btn" id="btn-plus">+</button>
    <button class="zoom-btn" id="btn-minus">−</button>
  </div>
</div>

<div class="panel" id="panel-left">
  <canvas id="c-left"></canvas>
</div>

<div class="panel" id="panel-right">
  <canvas id="c-right"></canvas>
  <div id="formula-box" style="
    position:absolute; top:24px; right:24px;
    background:rgba(0,0,0,0.25); backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px); border:1px solid #333;
    border-radius:8px; padding:10px 16px; pointer-events:auto; z-index:10;
    color:#ccc; font-size:15px;
  ">
    <button id="btn-numeric" style="
      display:block; margin-left:auto; margin-bottom:8px; padding:2px 10px;
      font-size:11px; font-family:serif; cursor:pointer;
      background:transparent; border:1px solid #555; border-radius:4px;
      color:#888; transition: all 0.15s;
    ">123</button>
    <div style="display:flex; gap:24px; align-items:flex-start;">
      <div id="formula-x"></div>
      <div style="width:1px; background:#444; align-self:stretch;"></div>
      <div id="formula-y"></div>
    </div>
  </div>
</div>

<script>
const dpr = window.devicePixelRatio || 1;
let scale = 50, targetScale = 50;
const scenes = [];

// --- state ---
const S = { a11: 2, a12: -1, a21: 0, a22: 1, b1: 4, b2: 2 };

function col1()     { return [S.a11, S.a21]; }
function col2()     { return [S.a12, S.a22]; }
function bVec()     { return [S.b1,  S.b2];  }
function solution() {
  const det = S.a11 * S.a22 - S.a12 * S.a21;
  if (Math.abs(det) < 1e-9) return [0, 0];
  return [
    (S.b1 * S.a22 - S.b2 * S.a12) / det,
    (S.a11 * S.b2 - S.a21 * S.b1) / det,
  ];
}

// wire inputs + add ▲▼ buttons
['a11','a12','a21','a22','b1','b2'].forEach(id => {
  const inp = document.getElementById(id);
  S[id] = parseFloat(inp.value) || 0;
  inp.addEventListener('input', e => {
    S[id] = parseFloat(e.target.value) || 0;
    scenes.forEach(s => s.draw());
    updateFormula();
  });

  // wrap in .mat-cell and add spin buttons
  const cell = document.createElement('div');
  cell.className = 'mat-cell';
  inp.parentNode.insertBefore(cell, inp);
  cell.appendChild(inp);

  const btns = document.createElement('div');
  btns.className = 'spin-btns';
  ['▲','▼'].forEach((arrow, i) => {
    const b = document.createElement('div');
    b.className = 'spin-btn';
    b.textContent = arrow;
    b.addEventListener('click', () => {
      inp.value = (parseFloat(inp.value) || 0) + (i === 0 ? 1 : -1);
      inp.dispatchEvent(new Event('input'));
    });
    btns.appendChild(b);
  });
  cell.appendChild(btns);
});

// --- scenes ---
function makeScene(canvasId, panelId, getArrows, showTransGrid, drawExtras) {
  const canvas = document.getElementById(canvasId);
  const panel  = document.getElementById(panelId);
  const ctx    = canvas.getContext('2d');
  let W, H, cx, cy;

  // pre-create label divs (max 6)
  const labelDivs = Array.from({length: 6}, (_, i) => {
    const div = document.createElement('div');
    div.className = 'vec-label';
    div.style.display = 'none';
    panel.appendChild(div);
    return div;
  });

  function toScreen(x, y) { return [cx + x * scale, cy - y * scale]; }

  function drawArrow(x2, y2, color) {
    const [sx1, sy1] = toScreen(0, 0);
    const [sx2, sy2] = toScreen(x2, y2);
    if (sx1 === sx2 && sy1 === sy2) return;
    const angle = Math.atan2(sy2 - sy1, sx2 - sx1);
    const hl = 12;
    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx2, sy2);
    ctx.lineTo(sx2 - hl * Math.cos(angle - 0.4), sy2 - hl * Math.sin(angle - 0.4));
    ctx.lineTo(sx2 - hl * Math.cos(angle + 0.4), sy2 - hl * Math.sin(angle + 0.4));
    ctx.closePath(); ctx.fill();
  }

  function drawGrid() {
    ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
    const rx = Math.ceil(W / 2 / scale) + 1;
    const ry = Math.ceil(H / 2 / scale) + 1;
    for (let i = -rx; i <= rx; i++) {
      const [x] = toScreen(i, 0);
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let i = -ry; i <= ry; i++) {
      const [, y] = toScreen(0, i);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function drawAxes() {
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    const rx = Math.ceil(W / 2 / scale), ry = Math.ceil(H / 2 / scale);
    for (let i = -rx; i <= rx; i++) {
      if (!i) continue;
      const [x] = toScreen(i, 0); ctx.fillText(i, x, cy + 16);
    }
    ctx.textAlign = 'right';
    for (let i = -ry; i <= ry; i++) {
      if (!i) continue;
      const [, y] = toScreen(0, i); ctx.fillText(i, cx - 6, y + 4);
    }
    ctx.fillStyle = '#777'; ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'left';   ctx.fillText('x', W - 20, cy - 10);
    ctx.textAlign = 'center'; ctx.fillText('y', cx + 14, 18);
  }

  function drawTransformedGrid() {
    const [c1x, c1y] = col1(), [c2x, c2y] = col2();
    const range = 20, t = 30;
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(224,92,58,0.35)';
    for (let n = -range; n <= range; n++) {
      const px = n*c2x, py = n*c2y;
      const [sx1,sy1] = toScreen(px - c1x*t, py - c1y*t);
      const [sx2,sy2] = toScreen(px + c1x*t, py + c1y*t);
      ctx.beginPath(); ctx.moveTo(sx1,sy1); ctx.lineTo(sx2,sy2); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(92,168,224,0.35)';
    for (let n = -range; n <= range; n++) {
      const px = n*c1x, py = n*c1y;
      const [sx1,sy1] = toScreen(px - c2x*t, py - c2y*t);
      const [sx2,sy2] = toScreen(px + c2x*t, py + c2y*t);
      ctx.beginPath(); ctx.moveTo(sx1,sy1); ctx.lineTo(sx2,sy2); ctx.stroke();
    }
  }

  function fillPara(pts, fillColor, strokeColor, label, labelPos) {
    ctx.beginPath();
    ctx.moveTo(...pts[0]);
    pts.slice(1).forEach(p => ctx.lineTo(...p));
    ctx.closePath();
    ctx.fillStyle = fillColor; ctx.fill();
    ctx.strokeStyle = strokeColor; ctx.lineWidth = 1; ctx.stroke();
    if (label) {
      const [lx, ly] = labelPos;
      ctx.fillStyle = strokeColor.replace('0.5', '0.9');
      ctx.font = 'italic bold 18px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(label, lx, ly);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawGrid(); drawAxes();
    if (showTransGrid) drawTransformedGrid();
    if (drawExtras) drawExtras(ctx, toScreen, fillPara);

    const arrows = getArrows();
    labelDivs.forEach((d, i) => {
      if (i < arrows.length && arrows[i].tex) {
        d.style.display = '';
        d.style.color = arrows[i].color;
        if (d.dataset.tex !== arrows[i].tex) {
          if (window.katex) {
            katex.render(arrows[i].tex, d, { throwOnError: false });
            d.dataset.tex = arrows[i].tex;
          }
        }
        drawArrow(arrows[i].x, arrows[i].y, arrows[i].color);
        const [sx, sy] = toScreen(arrows[i].x, arrows[i].y);
        d.style.left = sx + 'px'; d.style.top = sy + 'px';
      } else if (i < arrows.length) {
        d.style.display = 'none';
        drawArrow(arrows[i].x, arrows[i].y, arrows[i].color);
      } else {
        d.style.display = 'none';
      }
    });
  }

  function resize() {
    W = Math.floor(window.innerWidth / 2); H = window.innerHeight;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    canvas.width = W*dpr; canvas.height = H*dpr;
    ctx.scale(dpr, dpr);
    cx = W/2; cy = H/2;
    draw();
  }

  scenes.push({ draw, resize });
  window.addEventListener('resize', resize);
  resize();
}

// --- left canvas: transformation ---
makeScene('c-right', 'panel-right',
  () => {
    const [c1x,c1y] = col1(), [c2x,c2y] = col2(), [bx,by] = bVec();
    return [
      { x: c1x, y: c1y, color: '#e05c3a', tex: `\\begin{pmatrix}${c1x}\\\\${c1y}\\end{pmatrix}` },
      { x: c2x, y: c2y, color: '#5ca8e0', tex: `\\begin{pmatrix}${c2x}\\\\${c2y}\\end{pmatrix}` },
      { x: bx,  y: by,  color: '#f0d060', tex: `\\begin{pmatrix}${bx}\\\\${by}\\end{pmatrix}` },
    ];
  },
  true,
  (ctx, ts, fp) => {
    const [c1x,c1y] = col1(), [bx,by] = bVec(), [c2x,c2y] = col2();
    const o = ts(0,0), c1 = ts(c1x,c1y), b = ts(bx,by), c1b = ts(c1x+bx,c1y+by);
    fp([o,c1,c1b,b], 'rgba(224,92,58,0.15)', 'rgba(224,92,58,0.5)', "det(A)·y",
      ts((c1x+bx)/2, (c1y+by)/2));
    const c2 = ts(c2x,c2y), c2b = ts(c2x+bx,c2y+by);
    fp([o,c2,c2b,b], 'rgba(92,168,224,0.15)', 'rgba(92,168,224,0.5)', "det(A)·x",
      ts((c2x+bx)/2, (c2y+by)/2));
  }
);

// --- right canvas: solution space ---
makeScene('c-left', 'panel-left',
  () => {
    const [sx, sy] = solution();
    return [
      { x: 1,  y: 0,  color: '#e05c3a', tex: '\\hat{i}' },
      { x: 0,  y: 1,  color: '#5ca8e0', tex: '\\hat{j}' },
      { x: sx, y: sy, color: '#a0ff80', tex: '\\begin{pmatrix}x\\\\y\\end{pmatrix}' },
    ];
  },
  false,
  (ctx, ts, fp) => {
    const [sx, sy] = solution();
    const o = ts(0,0), i = ts(1,0), ips = ts(1+sx,sy), s = ts(sx,sy);
    fp([o,i,ips,s], 'rgba(224,92,58,0.15)', 'rgba(224,92,58,0.5)', 'y',
      ts((1+sx)/2, sy/2));
    const j = ts(0,1), jps = ts(sx,1+sy);
    fp([o,j,jps,s], 'rgba(92,168,224,0.15)', 'rgba(92,168,224,0.5)', 'x',
      ts(sx/2, (1+sy)/2));
  }
);

// --- formula panel ---
let numericMode = false;

function updateFormula() {
  if (!window.katex) return;
  const [c1x,c1y] = col1(), [c2x,c2y] = col2(), [bx,by] = bVec();
  const detA = S.a11*S.a22 - S.a12*S.a21;
  const dA   = numericMode ? detA : '\\det(A)';

  // x
  const t11 = numericMode ? c1x : 't_{11}';
  const t12 = numericMode ? c1y : 't_{12}';
  const b1  = numericMode ? bx  : 'b_1';
  const b2  = numericMode ? by  : 'b_2';
  const numValX = c1x*by - bx*c1y;
  const xVal    = Math.abs(detA) > 1e-9 ? numValX / detA : NaN;
  const extraX  = numericMode
    ? ` = \\dfrac{${numValX}}{${detA}} = ${Number.isFinite(xVal) ? +xVal.toFixed(4) : '\\infty'}`
    : '';
  katex.render(
    `\\textcolor{#e05c3a}{\\det(A)\\cdot y} = \\det\\begin{pmatrix}\\textcolor{#e05c3a}{${t11}} & \\textcolor{#f0d060}{${b1}} \\\\ \\textcolor{#e05c3a}{${t12}} & \\textcolor{#f0d060}{${b2}}\\end{pmatrix} \\\\[6pt] \\textcolor{#e05c3a}{y} = \\dfrac{\\det\\begin{pmatrix}\\textcolor{#e05c3a}{${t11}} & \\textcolor{#f0d060}{${b1}} \\\\ \\textcolor{#e05c3a}{${t12}} & \\textcolor{#f0d060}{${b2}}\\end{pmatrix}}{${dA}}${extraX}`,
    document.getElementById('formula-y'),
    { throwOnError: false, displayMode: true }
  );

  // y
  const t21 = numericMode ? c2x : 't_{21}';
  const t22 = numericMode ? c2y : 't_{22}';
  const numValY = bx*c2y - c2x*by;
  const yVal    = Math.abs(detA) > 1e-9 ? numValY / detA : NaN;
  const extraY  = numericMode
    ? ` = \\dfrac{${numValY}}{${detA}} = ${Number.isFinite(yVal) ? +yVal.toFixed(4) : '\\infty'}`
    : '';
  katex.render(
    `\\textcolor{#5ca8e0}{\\det(A)\\cdot x} = \\det\\begin{pmatrix}\\textcolor{#f0d060}{${b1}} & \\textcolor{#5ca8e0}{${t21}} \\\\ \\textcolor{#f0d060}{${b2}} & \\textcolor{#5ca8e0}{${t22}}\\end{pmatrix} \\\\[6pt] \\textcolor{#5ca8e0}{x} = \\dfrac{\\det\\begin{pmatrix}\\textcolor{#f0d060}{${b1}} & \\textcolor{#5ca8e0}{${t21}} \\\\ \\textcolor{#f0d060}{${b2}} & \\textcolor{#5ca8e0}{${t22}}\\end{pmatrix}}{${dA}}${extraY}`,
    document.getElementById('formula-x'),
    { throwOnError: false, displayMode: true }
  );
}

document.getElementById('btn-numeric').addEventListener('click', () => {
  numericMode = !numericMode;
  const btn = document.getElementById('btn-numeric');
  btn.style.color  = numericMode ? '#fff' : '#888';
  btn.style.borderColor = numericMode ? '#aaa' : '#555';
  btn.style.background  = numericMode ? 'rgba(255,255,255,0.1)' : 'transparent';
  updateFormula();
});

// --- zoom ---
document.getElementById('btn-plus').addEventListener('click',  () => { targetScale *= 1.4; });
document.getElementById('btn-minus').addEventListener('click', () => { targetScale *= 0.7; });

function animate() {
  if (Math.abs(targetScale - scale) > 0.2) {
    scale += (targetScale - scale) * 0.12;
    scenes.forEach(s => s.draw());
  }
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
