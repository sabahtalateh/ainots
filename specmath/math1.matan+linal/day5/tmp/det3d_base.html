<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Параллелепипед</title>
  <style>
    html,body { margin:0; height:100%; overflow:hidden; background:#1a1d23; color:#ddd; font-family:system-ui,sans-serif; }
    canvas { display:block; }
    #ctrl {
      position:absolute; top:0; right:0; bottom:0; width:240px;
      background:rgba(14,16,22,0.97); border-left:1px solid #252840;
      padding:14px; font-size:13px; user-select:none;
      display:flex; flex-direction:column; gap:10px; overflow-y:auto;
    }
    #ctrl h3 { margin:0 0 4px; font-size:13px; color:#a5c8ff; }
    #ctrl table { border-collapse:collapse; width:100%; }
    #ctrl td { padding:3px 2px; vertical-align:middle; }
    .va{color:#4fc3f7;font-weight:bold;} .vb{color:#ef9a9a;font-weight:bold;} .vc{color:#a5d6a7;font-weight:bold;}
    .btn {
      background:#22263a; border:1px solid #3a4060; color:#ccc; border-radius:4px;
      width:20px; height:20px; cursor:pointer; font-size:13px; line-height:1; padding:0; text-align:center;
    }
    .btn:hover { background:#3a4060; color:#fff; }
    #det-row {
      font-size:12px; color:#aaa; border-top:1px solid #252840;
      padding-top:10px; line-height:2.0;
    }
    #hint-t { font-size:11px; color:#556; margin-top:auto; line-height:1.7; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ctrl">
  <h3>Векторы</h3>
  <table>
    <tr>
      <td><span class="va">a</span></td>
      <td>(<span id="a0v">3</span></td>
      <td><button class="btn" data-v="A" data-i="0" data-d="-1">−</button><button class="btn" data-v="A" data-i="0" data-d="1">+</button></td>
      <td><span id="a1v">1</span></td>
      <td><button class="btn" data-v="A" data-i="1" data-d="-1">−</button><button class="btn" data-v="A" data-i="1" data-d="1">+</button></td>
      <td><span id="a2v">1</span>)</td>
      <td><button class="btn" data-v="A" data-i="2" data-d="-1">−</button><button class="btn" data-v="A" data-i="2" data-d="1">+</button></td>
    </tr>
    <tr>
      <td><span class="vb">b</span></td>
      <td>(<span id="b0v">1</span></td>
      <td><button class="btn" data-v="B" data-i="0" data-d="-1">−</button><button class="btn" data-v="B" data-i="0" data-d="1">+</button></td>
      <td><span id="b1v">3</span></td>
      <td><button class="btn" data-v="B" data-i="1" data-d="-1">−</button><button class="btn" data-v="B" data-i="1" data-d="1">+</button></td>
      <td><span id="b2v">1</span>)</td>
      <td><button class="btn" data-v="B" data-i="2" data-d="-1">−</button><button class="btn" data-v="B" data-i="2" data-d="1">+</button></td>
    </tr>
    <tr>
      <td><span class="vc">c</span></td>
      <td>(<span id="c0v">1</span></td>
      <td><button class="btn" data-v="C" data-i="0" data-d="-1">−</button><button class="btn" data-v="C" data-i="0" data-d="1">+</button></td>
      <td><span id="c1v">1</span></td>
      <td><button class="btn" data-v="C" data-i="1" data-d="-1">−</button><button class="btn" data-v="C" data-i="1" data-d="1">+</button></td>
      <td><span id="c2v">3</span>)</td>
      <td><button class="btn" data-v="C" data-i="2" data-d="-1">−</button><button class="btn" data-v="C" data-i="2" data-d="1">+</button></td>
    </tr>
  </table>

  <div id="det-row">
    det = <b style="color:#f1c40f" id="detval">?</b><br>
    = <span id="det-expand" style="color:#999; font-size:11px;">?</span>
  </div>

  <button id="spin-btn" style="
    background:#22263a; border:1px solid #3a4060; color:#a5c8ff;
    border-radius:5px; padding:6px 10px; cursor:pointer; font-size:12px;
    text-align:center; transition: background 0.15s, border-color 0.15s;
  ">▶ Вращение</button>

  <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:#aaa;">
    <input type="checkbox" id="center-view" checked style="accent-color:#aaa;width:14px;height:14px;">
    параллелепипед по центру
  </label>

  <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:#f1c40f;">
    <input type="checkbox" id="show-bbox" checked style="accent-color:#f1c40f;width:14px;height:14px;">
    объемлющий куб
  </label>

  <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:#80ffaa;">
    <input type="checkbox" id="show-grid27" style="accent-color:#80ffaa;width:14px;height:14px;">
    27 ящиков (разложение)
  </label>

  <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:#88aaff;">
    <input type="checkbox" id="show-paths6" style="accent-color:#88aaff;width:14px;height:14px;">
    6 путей Лейбница
  </label>

  <div style="border-top:1px solid #252840;padding-top:10px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span style="font-size:12px;color:#a5c8ff;">Свои ящики</span>
      <button id="add-box-btn" style="background:#22263a;border:1px solid #3a4060;color:#a5c8ff;border-radius:4px;padding:3px 8px;cursor:pointer;font-size:12px;">＋ куб</button>
    </div>
    <div style="font-size:10px;color:#556;margin-bottom:3px;">пресеты (−, текущие векторы)</div>
    <div id="presets" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;"></div>
    <div id="custom-boxes"></div>
  </div>

  <div id="hint-t">
    Тяни — вращение<br>
    Колёсико — зум
  </div>
</div>

<script>
(function(){
  var canvas = document.getElementById("c");
  var ctx    = canvas.getContext("2d");
  var SBW    = 240;

  var A=[3,1,1], B=[1,3,1], C=[1,1,3];
  var vecs={A:A,B:B,C:C};
  var spans={
    A:[document.getElementById("a0v"),document.getElementById("a1v"),document.getElementById("a2v")],
    B:[document.getElementById("b0v"),document.getElementById("b1v"),document.getElementById("b2v")],
    C:[document.getElementById("c0v"),document.getElementById("c1v"),document.getElementById("c2v")]
  };

  function det3(a,b,c){
    return a[0]*(b[1]*c[2]-b[2]*c[1])
          -a[1]*(b[0]*c[2]-b[2]*c[0])
          +a[2]*(b[0]*c[1]-b[1]*c[0]);
  }

  function updateUI(){
    var d = det3(A,B,C);
    document.getElementById("detval").textContent = d;
    document.getElementById("det-expand").textContent =
      A[0]+"·("+B[1]+"·"+C[2]+"−"+B[2]+"·"+C[1]+") − "+
      A[1]+"·("+B[0]+"·"+C[2]+"−"+B[2]+"·"+C[0]+") + "+
      A[2]+"·("+B[0]+"·"+C[1]+"−"+B[1]+"·"+C[0]+")";
  }
  updateUI();

  document.getElementById("ctrl").addEventListener("click", function(e){
    var b = e.target.closest(".btn"); if(!b) return;
    var v=b.dataset.v, i=+b.dataset.i, d=+b.dataset.d;
    if(!vecs[v]) return;
    vecs[v][i] += d;
    spans[v][i].textContent = vecs[v][i];
    updateUI();
  });

  /* ── camera ── */
  var cam = {theta:0.55, phi:0.50};
  var drag = {active:false, x:0, y:0};
  window.addEventListener("mousedown", function(e){
    if(e.target.closest("#ctrl")) return;
    drag.active=true; drag.x=e.clientX; drag.y=e.clientY;
  });
  window.addEventListener("mouseup",   function(){ drag.active=false; });
  window.addEventListener("mousemove", function(e){
    if(!drag.active) return;
    cam.theta -= (e.clientX-drag.x)*0.007;
    cam.phi   -= (e.clientY-drag.y)*0.007;
    cam.phi = Math.max(0.05, Math.min(Math.PI/2-0.03, cam.phi));
    drag.x=e.clientX; drag.y=e.clientY;
  });
  var gScale = 1.0;
  window.addEventListener("wheel", function(e){
    gScale = Math.max(0.3, Math.min(3.0, gScale - e.deltaY*0.001));
  },{passive:true});

  var spinning = false;
  var spinBtn = document.getElementById("spin-btn");
  spinBtn.textContent = "▶ Вращение";
  spinBtn.style.borderColor = "#3a4060";
  spinBtn.style.background  = "#22263a";
  spinBtn.addEventListener("click", function(){
    spinning = !spinning;
    spinBtn.textContent = spinning ? "⏹ Стоп" : "▶ Вращение";
    spinBtn.style.borderColor = spinning ? "#a5c8ff" : "#3a4060";
    spinBtn.style.background  = spinning ? "rgba(60,70,110,0.5)" : "#22263a";
  });

  /* ── 3D projection ── */
  function project(p){
    var ct=Math.cos(cam.theta), st=Math.sin(cam.theta);
    var cp=Math.cos(cam.phi),   sp=Math.sin(cam.phi);
    var rx = ct*p[0]+st*p[1];
    var ry = -st*p[0]+ct*p[1];
    return [rx, -sp*ry+cp*p[2]];
  }
  function scr(p3,sc,ox,oy){ var p=project(p3); return{x:ox+p[0]*sc, y:oy-p[1]*sc}; }
  function line3(p,q,sc,ox,oy){ var a=scr(p,sc,ox,oy),b=scr(q,sc,ox,oy); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); }
  function arrow3(f,t,sc,ox,oy){
    var a=scr(f,sc,ox,oy), b=scr(t,sc,ox,oy);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    var dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy); if(len<1) return;
    var ux=dx/len, uy=dy/len, hs=8;
    ctx.beginPath(); ctx.moveTo(b.x,b.y);
    ctx.lineTo(b.x-ux*hs-uy*hs*0.4, b.y-uy*hs+ux*hs*0.4);
    ctx.lineTo(b.x-ux*hs+uy*hs*0.4, b.y-uy*hs-ux*hs*0.4);
    ctx.closePath(); ctx.fill();
  }
  function face3(pts,color,sc,ox,oy){
    var ps=pts.map(function(p){return scr(p,sc,ox,oy);});
    ctx.beginPath(); ctx.moveTo(ps[0].x,ps[0].y);
    for(var i=1;i<ps.length;i++) ctx.lineTo(ps[i].x,ps[i].y);
    ctx.closePath(); ctx.fillStyle=color; ctx.fill();
  }

  function drawGrid(sc,ox,oy){
    var G=5;
    ctx.beginPath(); ctx.strokeStyle="rgba(120,130,160,.15)"; ctx.lineWidth=0.8;
    for(var i=-G;i<=G;i++){
      line3([i,-G,0],[i,G,0],sc,ox,oy);
      line3([-G,i,0],[G,i,0],sc,ox,oy);
    }
    ctx.stroke();
  }

  function drawAxes(sc,ox,oy){
    var L=5;
    ctx.lineWidth=1.8; ctx.font="bold 13px system-ui,sans-serif";
    ctx.strokeStyle="#e74c3c"; ctx.fillStyle="#e74c3c";
    arrow3([0,0,0],[L,0,0],sc,ox,oy);
    var px=scr([L+0.25,0,0],sc,ox,oy); ctx.fillText("x",px.x,px.y+4);
    ctx.strokeStyle="#2ecc71"; ctx.fillStyle="#2ecc71";
    arrow3([0,0,0],[0,L,0],sc,ox,oy);
    var py=scr([0,L+0.25,0],sc,ox,oy); ctx.fillText("y",py.x,py.y+4);
    ctx.strokeStyle="#3498db"; ctx.fillStyle="#3498db";
    arrow3([0,0,0],[0,0,L],sc,ox,oy);
    var pz=scr([0,0,L+0.25],sc,ox,oy); ctx.fillText("z",pz.x,pz.y+4);
  }

  function drawParallelepiped(sc,ox,oy){
    var O=[0,0,0];
    var AB=[A[0]+B[0], A[1]+B[1], A[2]+B[2]];
    var AC=[A[0]+C[0], A[1]+C[1], A[2]+C[2]];
    var BC=[B[0]+C[0], B[1]+C[1], B[2]+C[2]];
    var ABC=[A[0]+B[0]+C[0], A[1]+B[1]+C[1], A[2]+B[2]+C[2]];

    /* faces — back ones first */
    face3([O,A,AB,B],   "rgba(241,196,15,0.10)",sc,ox,oy);
    face3([A,AB,ABC,AC],"rgba(79,195,247,0.08)",sc,ox,oy);
    face3([B,AB,ABC,BC],"rgba(239,154,154,0.08)",sc,ox,oy);
    face3([C,AC,ABC,BC],"rgba(165,214,167,0.12)",sc,ox,oy);
    face3([O,A,AC,C],   "rgba(79,195,247,0.06)",sc,ox,oy);
    face3([O,B,BC,C],   "rgba(239,154,154,0.06)",sc,ox,oy);

    /* edges */
    var eds=[
      [O,A],[O,B],[O,C],
      [A,AB],[A,AC],
      [B,AB],[B,BC],
      [C,AC],[C,BC],
      [AB,ABC],[AC,ABC],[BC,ABC]
    ];
    ctx.beginPath(); ctx.strokeStyle="rgba(200,210,230,0.55)"; ctx.lineWidth=1.2;
    eds.forEach(function(e){ line3(e[0],e[1],sc,ox,oy); });
    ctx.stroke();

    /* vectors */
    ctx.lineWidth=2.8; ctx.font="bold 14px system-ui,sans-serif";
    ctx.strokeStyle="#4fc3f7"; ctx.fillStyle="#4fc3f7";
    arrow3(O,A,sc,ox,oy);
    var pa=scr([A[0]/2,A[1]/2,A[2]/2],sc,ox,oy); ctx.fillText("a",pa.x-14,pa.y-4);
    ctx.strokeStyle="#ef9a9a"; ctx.fillStyle="#ef9a9a";
    arrow3(O,B,sc,ox,oy);
    var pb=scr([B[0]/2,B[1]/2,B[2]/2],sc,ox,oy); ctx.fillText("b",pb.x-14,pb.y+6);
    ctx.strokeStyle="#a5d6a7"; ctx.fillStyle="#a5d6a7";
    arrow3(O,C,sc,ox,oy);
    var pc=scr([C[0]/2,C[1]/2,C[2]/2],sc,ox,oy); ctx.fillText("c",pc.x+6,pc.y);

    /* origin dot */
    var pO=scr([0,0,0],sc,ox,oy);
    ctx.fillStyle="#f1c40f"; ctx.beginPath(); ctx.arc(pO.x,pO.y,4,0,Math.PI*2); ctx.fill();
  }

  function drawBoundingBox(sc,ox,oy){
    var W=A[0]+B[0]+C[0], H=A[1]+B[1]+C[1], D=A[2]+B[2]+C[2];
    var p000=[0,0,0], p100=[W,0,0], p010=[0,H,0], p001=[0,0,D];
    var p110=[W,H,0], p101=[W,0,D], p011=[0,H,D], p111=[W,H,D];

    /* faint faces */
    var fc="rgba(241,196,15,0.04)";
    face3([p000,p100,p110,p010],fc,sc,ox,oy);
    face3([p000,p100,p101,p001],fc,sc,ox,oy);
    face3([p000,p010,p011,p001],fc,sc,ox,oy);
    face3([p100,p110,p111,p101],fc,sc,ox,oy);
    face3([p010,p110,p111,p011],fc,sc,ox,oy);
    face3([p001,p101,p111,p011],fc,sc,ox,oy);

    /* dashed edges */
    ctx.save(); ctx.setLineDash([6,4]);
    ctx.strokeStyle="rgba(241,196,15,0.55)"; ctx.lineWidth=1.2;
    ctx.beginPath();
    [[p000,p100],[p000,p010],[p000,p001],
     [p100,p110],[p100,p101],
     [p010,p110],[p010,p011],
     [p001,p101],[p001,p011],
     [p110,p111],[p101,p111],[p011,p111]
    ].forEach(function(e){ line3(e[0],e[1],sc,ox,oy); });
    ctx.stroke();
    ctx.setLineDash([]); ctx.restore();

    /* dimension labels on three outer edges */
    ctx.font="11px system-ui,sans-serif"; ctx.fillStyle="rgba(241,196,15,0.9)";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    var pw=scr([W/2,-0.35,0],sc,ox,oy); ctx.fillText("W="+W, pw.x, pw.y);
    var ph=scr([-0.5,H/2,0],sc,ox,oy);  ctx.fillText("H="+H, ph.x, ph.y);
    var pd=scr([0,-0.4,D/2],sc,ox,oy);  ctx.fillText("D="+D, pd.x, pd.y);
    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  }

  function drawPrism(sc,ox,oy){
    /* 8 vertices of the parallelepiped */
    var O  =[0,0,0];
    var Va =A.slice();
    var Vb =B.slice();
    var Vc =C.slice();
    var Vab=[A[0]+B[0], A[1]+B[1], A[2]+B[2]];
    var Vac=[A[0]+C[0], A[1]+C[1], A[2]+C[2]];
    var Vbc=[B[0]+C[0], B[1]+C[1], B[2]+C[2]];
    var Vabc=[A[0]+B[0]+C[0], A[1]+B[1]+C[1], A[2]+B[2]+C[2]];
    var verts3=[O,Va,Vb,Vc,Vab,Vac,Vbc,Vabc];

    /* projections onto z=0 */
    function proj0(v){ return [v[0],v[1],0]; }
    var verts0=verts3.map(proj0);
    var O0=verts0[0], Va0=verts0[1], Vb0=verts0[2], Vc0=verts0[3];
    var Vab0=verts0[4], Vac0=verts0[5], Vbc0=verts0[6], Vabc0=verts0[7];

    /* shadow polygon on z=0 — fill the 6 parallelogram faces' shadows */
    var sc0="rgba(100,160,255,0.18)";
    face3([O0,Va0,Vab0,Vb0],  sc0,sc,ox,oy);
    face3([O0,Va0,Vac0,Vc0],  sc0,sc,ox,oy);
    face3([O0,Vb0,Vbc0,Vc0],  sc0,sc,ox,oy);
    face3([Va0,Vab0,Vabc0,Vac0], sc0,sc,ox,oy);
    face3([Vb0,Vab0,Vabc0,Vbc0], sc0,sc,ox,oy);
    face3([Vc0,Vac0,Vabc0,Vbc0], sc0,sc,ox,oy);

    /* shadow outline */
    ctx.beginPath(); ctx.strokeStyle="rgba(100,160,255,0.6)"; ctx.lineWidth=1.2;
    [[O0,Va0],[O0,Vb0],[O0,Vc0],
     [Va0,Vab0],[Va0,Vac0],[Vb0,Vab0],[Vb0,Vbc0],
     [Vc0,Vac0],[Vc0,Vbc0],[Vab0,Vabc0],[Vac0,Vabc0],[Vbc0,Vabc0]
    ].forEach(function(e){ line3(e[0],e[1],sc,ox,oy); });
    ctx.stroke();

    /* dashed perpendiculars from each 3D vertex down to z=0 */
    ctx.save();
    ctx.setLineDash([5,4]); ctx.lineWidth=1.2; ctx.strokeStyle="rgba(150,200,255,0.55)";
    ctx.beginPath();
    verts3.forEach(function(v,i){
      if(v[2] !== 0) line3(v, verts0[i], sc,ox,oy);
    });
    ctx.stroke();
    ctx.setLineDash([]); ctx.restore();

    /* curtain faces (walls of prism) — semi-transparent */
    var wc="rgba(100,160,255,0.07)";
    /* connect each top edge of parallelepiped to its shadow edge */
    face3([Va, Vab, Vab0, Va0],  wc,sc,ox,oy);
    face3([Vb, Vab, Vab0, Vb0],  wc,sc,ox,oy);
    face3([Va, Vac, Vac0, Va0],  wc,sc,ox,oy);
    face3([Vc, Vac, Vac0, Vc0],  wc,sc,ox,oy);
    face3([Vb, Vbc, Vbc0, Vb0],  wc,sc,ox,oy);
    face3([Vc, Vbc, Vbc0, Vc0],  wc,sc,ox,oy);
    face3([Vab,Vabc,Vabc0,Vab0], wc,sc,ox,oy);
    face3([Vac,Vabc,Vabc0,Vac0], wc,sc,ox,oy);
    face3([Vbc,Vabc,Vabc0,Vbc0], wc,sc,ox,oy);
    face3([O,  Va,  Va0,  O0],   wc,sc,ox,oy);
    face3([O,  Vb,  Vb0,  O0],   wc,sc,ox,oy);
    face3([O,  Vc,  Vc0,  O0],   wc,sc,ox,oy);
  }

  function drawXYDecomp(sc,ox,oy){
    var ax=A[0], ay=A[1];
    var bx=B[0], by=B[1];

    var O0    = [0,       0,    0];
    var Ax0   = [ax,      0,    0];
    var Bx0   = [bx,      0,    0];
    var Ap0   = [ax,      ay,   0];
    var Bp0   = [bx,      by,   0];
    var ABx0  = [ax+bx,   0,    0];
    var ABay0 = [ax+bx,   ay,   0];
    var ABby0 = [ax+bx,   by,   0];
    var ABp0  = [ax+bx,   ay+by,0];

    /* orange triangles — ax·ay/2 each, cancel between paths */
    face3([O0,  Ax0,  Ap0 ],        "rgba(255,165,50,0.40)", sc,ox,oy);
    face3([Bp0, ABp0, ABby0],        "rgba(255,165,50,0.40)", sc,ox,oy);

    /* purple triangles — bx·by/2 each, cancel between paths */
    face3([O0,  Bx0,  Bp0 ],        "rgba(180,100,255,0.40)",sc,ox,oy);
    face3([Ap0, ABp0, ABay0],        "rgba(180,100,255,0.40)",sc,ox,oy);

    /* red rectangle: ay·bx  (subtract) */
    face3([Ax0, ABx0, ABay0, Ap0],  "rgba(255,70,70,0.45)",  sc,ox,oy);
    ctx.beginPath(); ctx.strokeStyle="rgba(255,100,100,0.9)"; ctx.lineWidth=1.6;
    [[Ax0,ABx0],[ABx0,ABay0],[ABay0,Ap0],[Ap0,Ax0]].forEach(function(e){ line3(e[0],e[1],sc,ox,oy); });
    ctx.stroke();

    /* blue rectangle: ax·by  (add) */
    face3([Bx0, ABx0, ABby0, Bp0],  "rgba(70,130,255,0.45)", sc,ox,oy);
    ctx.beginPath(); ctx.strokeStyle="rgba(100,160,255,0.9)"; ctx.lineWidth=1.6;
    [[Bx0,ABx0],[ABx0,ABby0],[ABby0,Bp0],[Bp0,Bx0]].forEach(function(e){ line3(e[0],e[1],sc,ox,oy); });
    ctx.stroke();

    /* labels */
    ctx.font="bold 12px system-ui,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";

    var rc = scr([ax + bx/2, ay/2, 0], sc,ox,oy);
    ctx.fillStyle="rgba(255,110,110,1)";
    ctx.fillText("ay\u00b7bx = "+(ay*bx), rc.x, rc.y);

    var bc = scr([bx + ax/2, by/2, 0], sc,ox,oy);
    ctx.fillStyle="rgba(120,180,255,1)";
    ctx.fillText("ax\u00b7by = "+(ax*by), bc.x, bc.y);

    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  }


  function drawOneBox(off, dx, dy, dz, fillCol, strokeCol, lbl, val, sc,ox,oy){
    var x0=off[0], y0=off[1], z0=off[2];
    var x1=x0+dx, y1=y0+dy, z1=z0+dz;
    var cn=[[x0,y0,z0],[x1,y0,z0],[x0,y1,z0],[x0,y0,z1],
            [x1,y1,z0],[x1,y0,z1],[x0,y1,z1],[x1,y1,z1]];
    [[cn[0],cn[1],cn[4],cn[2]],[cn[3],cn[5],cn[7],cn[6]],
     [cn[0],cn[1],cn[5],cn[3]],[cn[2],cn[4],cn[7],cn[6]],
     [cn[0],cn[2],cn[6],cn[3]],[cn[1],cn[4],cn[7],cn[5]]
    ].forEach(function(f){face3(f,fillCol,sc,ox,oy);});
    ctx.beginPath(); ctx.strokeStyle=strokeCol; ctx.lineWidth=2.0;
    [[0,1],[0,2],[0,3],[1,4],[1,5],[2,4],[2,6],[3,5],[3,6],[4,7],[5,7],[6,7]]
      .forEach(function(e){line3(cn[e[0]],cn[e[1]],sc,ox,oy);});
    ctx.stroke();
    var mp=scr([(x0+x1)/2,(y0+y1)/2,(z0+z1)/2],sc,ox,oy);
    ctx.save(); ctx.font="bold 11px system-ui,sans-serif";
    ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(lbl+" = "+val, mp.x, mp.y);
    ctx.restore();
  }

  /* ── custom boxes ── */
  var LS_KEY = "det3d_boxes";

  function saveBoxes(){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(customBoxes)); }catch(e){}
  }

  var customBoxes = (function(){
    try{ var s=localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : []; }catch(e){ return []; }
  })();

  document.getElementById("add-box-btn").addEventListener("click", function(){
    customBoxes.push({ id: Date.now(), off:[0,0,0], dims:[1,1,1], sign:1 });
    saveBoxes();
    rebuildBoxUI();
  });

  function rebuildBoxUI(){
    var cont = document.getElementById("custom-boxes");
    cont.innerHTML = "";
    customBoxes.forEach(function(box){
      var d = document.createElement("div");
      d.style.cssText = "border:1px solid #2a2e44;border-radius:4px;padding:6px;margin-bottom:6px;";

      if(box.label){
        var hdr = document.createElement("div");
        hdr.style.cssText = "font-size:11px;font-weight:bold;margin-bottom:4px;color:"+(box.sign>0?"#80ffaa":"#ff9090")+";";
        hdr.textContent = (box.sign>0?"+":"−")+box.label;
        d.appendChild(hdr);
      }

      function makeRow(label, arr, idx){
        var tr = document.createElement("div");
        tr.style.cssText = "display:flex;align-items:center;gap:4px;margin:2px 0;font-size:11px;color:#aaa;";
        var lbl = document.createElement("span"); lbl.textContent = label+":"; lbl.style.width="24px";
        var val = document.createElement("span"); val.textContent = arr[idx]; val.style.cssText="width:22px;text-align:center;color:#ddd;";
        var bm = document.createElement("button"); bm.textContent="−"; bm.className="btn";
        bm.addEventListener("click",function(){ arr[idx]--; val.textContent=arr[idx]; saveBoxes(); });
        var bp = document.createElement("button"); bp.textContent="+"; bp.className="btn";
        bp.addEventListener("click",function(){ arr[idx]++; val.textContent=arr[idx]; saveBoxes(); });
        tr.appendChild(lbl); tr.appendChild(bm); tr.appendChild(val); tr.appendChild(bp);
        return tr;
      }

      function sectionLabel(text){
        var s = document.createElement("div");
        s.style.cssText = "font-size:10px;color:#556;margin:4px 0 1px;";
        s.textContent = text; return s;
      }

      d.appendChild(sectionLabel("позиция"));
      d.appendChild(makeRow("x", box.off, 0));
      d.appendChild(makeRow("y", box.off, 1));
      d.appendChild(makeRow("z", box.off, 2));
      d.appendChild(sectionLabel("размер"));
      d.appendChild(makeRow("dx", box.dims, 0));
      d.appendChild(makeRow("dy", box.dims, 1));
      d.appendChild(makeRow("dz", box.dims, 2));

      var bot = document.createElement("div");
      bot.style.cssText = "display:flex;gap:5px;margin-top:6px;";

      var signBtn = document.createElement("button");
      signBtn.style.cssText = "flex:1;background:#22263a;border:1px solid;border-radius:4px;cursor:pointer;font-size:11px;padding:2px 0;";
      function updateSign(){
        signBtn.textContent = box.sign>0 ? "+ зел" : "- красн";
        signBtn.style.borderColor = box.sign>0 ? "#80ffaa" : "#ff9090";
        signBtn.style.color        = box.sign>0 ? "#80ffaa" : "#ff9090";
      }
      updateSign();
      signBtn.addEventListener("click", function(){ box.sign=-box.sign; updateSign(); saveBoxes(); });

      var delBtn = document.createElement("button");
      delBtn.textContent = "✕";
      delBtn.style.cssText = "background:#22263a;border:1px solid #554;color:#887;border-radius:4px;width:24px;cursor:pointer;font-size:12px;";
      delBtn.addEventListener("click", function(){
        customBoxes = customBoxes.filter(function(b){ return b.id !== box.id; });
        saveBoxes();
        rebuildBoxUI();
      });

      bot.appendChild(signBtn); bot.appendChild(delBtn);
      d.appendChild(bot);

      var tetrRow = document.createElement("label");
      tetrRow.style.cssText = "display:flex;align-items:center;gap:5px;font-size:11px;color:#aaa;margin-top:5px;cursor:pointer;";
      var tetrCb = document.createElement("input"); tetrCb.type="checkbox"; tetrCb.checked=!!box.tetra;
      tetrRow.appendChild(tetrCb);
      tetrRow.appendChild(document.createTextNode("пирамида"));
      d.appendChild(tetrRow);

      // pyramid options: base side + apex corner
      var pyrOpts = document.createElement("div");
      pyrOpts.style.cssText = "margin-top:5px;display:"+(box.tetra?"block":"none")+";";

      // base toggle
      var baseBtn = document.createElement("button");
      baseBtn.style.cssText = "width:100%;background:#22263a;border:1px solid #3a4060;color:#ccc;border-radius:4px;cursor:pointer;font-size:11px;padding:2px 0;margin-bottom:5px;";
      function updateBase(){ baseBtn.textContent = box.baseTop ? "основание: верх ↑" : "основание: низ ↓"; }
      updateBase();
      baseBtn.addEventListener("click", function(){ box.baseTop=!box.baseTop; updateBase(); saveBoxes(); });
      pyrOpts.appendChild(baseBtn);

      // apex 2×2 grid  corners: 0=↙(x0y0) 1=↘(x1y0) 2=↗(x1y1) 3=↖(x0y1)
      var apexLbl = document.createElement("div");
      apexLbl.style.cssText = "font-size:10px;color:#556;margin-bottom:3px;";
      apexLbl.textContent = "вершина:";
      pyrOpts.appendChild(apexLbl);
      var grid = document.createElement("div");
      grid.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:3px;";
      var apexLabels = ["↖ (x0,y1)","↗ (x1,y1)","↙ (x0,y0)","↘ (x1,y0)"];
      var apexIdx    = [3, 2, 0, 1]; // visual order → data index
      var apexBtns = [];
      function refreshApexBtns(){
        apexBtns.forEach(function(ab,vi){
          var active = (box.apex||0) === apexIdx[vi];
          ab.style.borderColor = active ? "#a5c8ff" : "#3a4060";
          ab.style.color       = active ? "#a5c8ff" : "#888";
          ab.style.background  = active ? "rgba(60,80,130,0.5)" : "#22263a";
        });
      }
      apexLabels.forEach(function(lbl, vi){
        var ab = document.createElement("button");
        ab.textContent = lbl;
        ab.style.cssText = "background:#22263a;border:1px solid #3a4060;color:#888;border-radius:3px;cursor:pointer;font-size:10px;padding:2px 1px;";
        ab.addEventListener("click", function(){ box.apex=apexIdx[vi]; refreshApexBtns(); saveBoxes(); });
        apexBtns.push(ab);
        grid.appendChild(ab);
      });
      refreshApexBtns();
      pyrOpts.appendChild(grid);
      d.appendChild(pyrOpts);

      tetrCb.addEventListener("change", function(){
        box.tetra=tetrCb.checked;
        pyrOpts.style.display = box.tetra ? "block" : "none";
        saveBoxes();
      });

      cont.appendChild(d);
    });
  }

  /* preset buttons */
  var PRESETS = [
    { lbl:"ax·ay·az", dims:function(){ return [A[0],A[1],A[2]]; }, sign:-1 },
    { lbl:"bx·by·bz", dims:function(){ return [B[0],B[1],B[2]]; }, sign:-1 },
    { lbl:"cx·cy·cz", dims:function(){ return [C[0],C[1],C[2]]; }, sign:-1 },
    { lbl:"ax·by·cz", dims:function(){ return [A[0],B[1],C[2]]; }, sign: 1 },
    { lbl:"bx·cy·az", dims:function(){ return [B[0],C[1],A[2]]; }, sign: 1 },
    { lbl:"cx·ay·bz", dims:function(){ return [C[0],A[1],B[2]]; }, sign: 1 },
  ];
  (function(){
    var cont = document.getElementById("presets");
    PRESETS.forEach(function(p){
      var btn = document.createElement("button");
      btn.textContent = (p.sign>0?"+":"−")+p.lbl;
      btn.style.cssText = "background:#22263a;border:1px solid "+(p.sign>0?"#80ffaa":"#ff9090")+
        ";color:"+(p.sign>0?"#80ffaa":"#ff9090")+
        ";border-radius:3px;padding:2px 5px;cursor:pointer;font-size:10px;";
      btn.addEventListener("click", function(){
        customBoxes.push({ id:Date.now(), off:[0,0,0], dims:p.dims(), sign:p.sign, label:p.lbl });
        saveBoxes(); rebuildBoxUI();
      });
      cont.appendChild(btn);
    });
  })();

  rebuildBoxUI();

  function drawPyramid(off, dx, dy, dz, fillCol, strokeCol, lw, baseTop, apex, sc, ox, oy){
    var x0=off[0], y0=off[1], z0=off[2], x1=x0+dx, y1=y0+dy, z1=z0+dz;
    var bot=[[x0,y0,z0],[x1,y0,z0],[x1,y1,z0],[x0,y1,z0]];
    var top=[[x0,y0,z1],[x1,y0,z1],[x1,y1,z1],[x0,y1,z1]];
    var base=baseTop?top:bot, AP=(baseTop?bot:top)[apex];
    var B0=base[0],B1=base[1],B2=base[2],B3=base[3];
    [[B0,B1,B2,B3],[B0,B1,AP],[B1,B2,AP],[B2,B3,AP],[B3,B0,AP]]
      .forEach(function(f){ face3(f, fillCol, sc, ox, oy); });
    ctx.beginPath(); ctx.strokeStyle=strokeCol; ctx.lineWidth=lw;
    [[B0,B1],[B1,B2],[B2,B3],[B3,B0],[B0,AP],[B1,AP],[B2,AP],[B3,AP]]
      .forEach(function(e){ line3(e[0],e[1],sc,ox,oy); });
    ctx.stroke();
  }

  function drawCustomBoxes(sc, ox, oy){
    customBoxes.forEach(function(box){
      var isPos = box.sign > 0;
      var fc = isPos ? "rgba(80,220,120,0.25)" : "rgba(255,80,80,0.25)";
      var sc2 = isPos ? "rgba(80,220,120,0.9)"  : "rgba(255,100,100,0.9)";
      if(box.tetra)
        drawPyramid(box.off, box.dims[0], box.dims[1], box.dims[2], fc, sc2, 2.0,
                    !!box.baseTop, box.apex||0, sc, ox, oy);
      else
        drawBoxRaw(box.off, box.dims[0], box.dims[1], box.dims[2], fc, sc2, 2.0, sc, ox, oy);
      if(box.label){
        var mp=scr([box.off[0]+box.dims[0]/2, box.off[1]+box.dims[1]/2, box.off[2]+box.dims[2]/2], sc, ox, oy);
        ctx.save(); ctx.font="bold 11px system-ui"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillStyle = isPos ? "#80ffaa" : "#ff9090";
        ctx.fillText((isPos?"+":"−")+box.label, mp.x, mp.y);
        ctx.restore();
      }
    });
  }

  function drawBoxRaw(off, dx, dy, dz, fillCol, strokeCol, lw, sc, ox, oy){
    var x0=off[0], y0=off[1], z0=off[2];
    var x1=x0+dx, y1=y0+dy, z1=z0+dz;
    var cn=[[x0,y0,z0],[x1,y0,z0],[x0,y1,z0],[x0,y0,z1],
            [x1,y1,z0],[x1,y0,z1],[x0,y1,z1],[x1,y1,z1]];
    [[cn[0],cn[1],cn[4],cn[2]],[cn[3],cn[5],cn[7],cn[6]],
     [cn[0],cn[1],cn[5],cn[3]],[cn[2],cn[4],cn[7],cn[6]],
     [cn[0],cn[2],cn[6],cn[3]],[cn[1],cn[4],cn[7],cn[5]]
    ].forEach(function(f){face3(f,fillCol,sc,ox,oy);});
    ctx.beginPath(); ctx.strokeStyle=strokeCol; ctx.lineWidth=lw;
    [[0,1],[0,2],[0,3],[1,4],[1,5],[2,4],[2,6],[3,5],[3,6],[4,7],[5,7],[6,7]]
      .forEach(function(e){line3(cn[e[0]],cn[e[1]],sc,ox,oy);});
    ctx.stroke();
  }

  function drawGrid27(sc, ox, oy){
    var vx=[A[0],B[0],C[0]], vy=[A[1],B[1],C[1]], vz=[A[2],B[2],C[2]];
    var Xs=[0, vx[0], vx[0]+vx[1]];
    var Ys=[0, vy[0], vy[0]+vy[1]];
    var Zs=[0, vz[0], vz[0]+vz[1]];
    var posSet={"0,1,2":1,"1,2,0":1,"2,0,1":1};
    var negSet={"0,2,1":1,"1,0,2":1,"2,1,0":1};
    var vn=[["ax","bx","cx"],["ay","by","cy"],["az","bz","cz"]];
    for(var i=0;i<3;i++) for(var j=0;j<3;j++) for(var k=0;k<3;k++){
      var key=i+","+j+","+k;
      var off=[Xs[i],Ys[j],Zs[k]];
      var dx=vx[i], dy=vy[j], dz=vz[k];
      if(posSet[key]){
        drawBoxRaw(off,dx,dy,dz,"rgba(80,220,120,0.25)","rgba(80,220,120,0.9)",2.0,sc,ox,oy);
        var mp=scr([off[0]+dx/2,off[1]+dy/2,off[2]+dz/2],sc,ox,oy);
        ctx.save(); ctx.font="bold 10px system-ui"; ctx.fillStyle="#80ffaa";
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("+"+vn[0][i]+"\u00b7"+vn[1][j]+"\u00b7"+vn[2][k], mp.x, mp.y);
        ctx.restore();
      } else if(negSet[key]){
        drawBoxRaw(off,dx,dy,dz,"rgba(255,80,80,0.25)","rgba(255,100,100,0.9)",2.0,sc,ox,oy);
        var mp2=scr([off[0]+dx/2,off[1]+dy/2,off[2]+dz/2],sc,ox,oy);
        ctx.save(); ctx.font="bold 10px system-ui"; ctx.fillStyle="#ff9090";
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("-"+vn[0][i]+"\u00b7"+vn[1][j]+"\u00b7"+vn[2][k], mp2.x, mp2.y);
        ctx.restore();
      } else {
        drawBoxRaw(off,dx,dy,dz,"rgba(150,160,180,0.04)","rgba(150,160,180,0.4)",0.8,sc,ox,oy);
      }
    }
  }

  function drawPaths6(sc, ox, oy){
    var vecArr=[A,B,C];
    var perms=[[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]];
    var posPerms={"0,1,2":1,"1,2,0":1,"2,0,1":1};
    var vx=[A[0],B[0],C[0]], vy=[A[1],B[1],C[1]], vz=[A[2],B[2],C[2]];
    var Xs=[0,vx[0],vx[0]+vx[1]], Ys=[0,vy[0],vy[0]+vy[1]], Zs=[0,vz[0],vz[0]+vz[1]];
    var vn=[["ax","bx","cx"],["ay","by","cy"],["az","bz","cz"]];
    var O=[0,0,0];
    for(var p=0;p<6;p++){
      var pm=perms[p];
      var v1=vecArr[pm[0]], v2=vecArr[pm[1]], v3=vecArr[pm[2]];
      var isPos=!!posPerms[pm.join(",")];
      var col=isPos?"rgba(80,220,120,1)":"rgba(255,100,100,1)";
      var fillCol=isPos?"rgba(80,220,120,0.18)":"rgba(255,80,80,0.18)";
      var p1=[v1[0],v1[1],v1[2]];
      var p2=[v1[0]+v2[0],v1[1]+v2[1],v1[2]+v2[2]];
      var p3=[v1[0]+v2[0]+v3[0],v1[1]+v2[1]+v3[1],v1[2]+v2[2]+v3[2]];
      ctx.strokeStyle=col; ctx.lineWidth=isPos?2.8:2.0;
      ctx.beginPath(); line3(O,p1,sc,ox,oy); ctx.stroke();
      ctx.beginPath(); line3(p1,p2,sc,ox,oy); ctx.stroke();
      ctx.beginPath(); line3(p2,p3,sc,ox,oy); ctx.stroke();
      [p1,p2].forEach(function(pt){
        var sp=scr(pt,sc,ox,oy);
        ctx.beginPath(); ctx.fillStyle=col;
        ctx.arc(sp.x,sp.y,3,0,Math.PI*2); ctx.fill();
      });
      var i=pm[0], j=pm[1], k=pm[2];
      var boff=[Xs[i],Ys[j],Zs[k]];
      var bdx=vx[i], bdy=vy[j], bdz=vz[k];
      drawBoxRaw(boff,bdx,bdy,bdz,fillCol,col,1.5,sc,ox,oy);
      var mp=scr([boff[0]+bdx/2,boff[1]+bdy/2,boff[2]+bdz/2],sc,ox,oy);
      ctx.save(); ctx.font="10px system-ui"; ctx.fillStyle=col;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText((isPos?"+":"-")+vn[0][i]+"\u00b7"+vn[1][j]+"\u00b7"+vn[2][k], mp.x, mp.y);
      ctx.restore();
    }
  }


  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  window.addEventListener("resize", resize); resize();

  var lastT = null;
  function tick(ts){
    if(spinning){
      if(lastT !== null) cam.theta += (ts - lastT) * 0.0003;
      lastT = ts;
    } else {
      lastT = null;
    }
    var W=canvas.width, H=canvas.height;
    var dW=W-SBW;
    var sc=Math.min(dW,H)*gScale/14;
    var ox=dW/2, oy=H/2;
    var ctr=[(A[0]+B[0]+C[0])/2,(A[1]+B[1]+C[1])/2,(A[2]+B[2]+C[2])/2];
    var pc=project(ctr); ox-=pc[0]*sc; oy+=pc[1]*sc;

    ctx.clearRect(0,0,W,H);
    ctx.fillStyle="#1a1d23"; ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.beginPath(); ctx.rect(0,0,dW,H); ctx.clip();
    drawGrid(sc,ox,oy);
    drawAxes(sc,ox,oy);
    if(document.getElementById("show-bbox").checked) drawBoundingBox(sc,ox,oy);
    if(document.getElementById("show-grid27").checked) drawGrid27(sc,ox,oy);
    drawCustomBoxes(sc,ox,oy);
    drawParallelepiped(sc,ox,oy);
    if(document.getElementById("show-paths6").checked) drawPaths6(sc,ox,oy);

    /* title */
    ctx.font="bold 14px system-ui,sans-serif";
    ctx.fillStyle="#a5c8ff"; ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillText("Параллелепипед на векторах a, b, c",dW/2,10);
    ctx.font="12px system-ui,sans-serif"; ctx.fillStyle="#667";
    ctx.fillText("объём = |det(a, b, c)|",dW/2,30);
    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
    ctx.restore();

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(function(ts){ lastT=ts; requestAnimationFrame(tick); });
})();
</script>
