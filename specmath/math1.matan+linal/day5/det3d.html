<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>3D</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a1d23;color:#ddd;font-family:system-ui,sans-serif;}
  canvas{display:block;}
  #ctrl{
    position:absolute;top:0;right:0;bottom:0;width:220px;
    background:rgba(12,14,20,0.78);border-left:1px solid #252840;
    padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;
    font-size:13px;user-select:none;
  }
  h3{margin:0 0 2px;font-size:13px;color:#a5c8ff;}
  table{border-collapse:collapse;width:100%;}
  td{padding:2px;vertical-align:middle;}
  .va{color:#e74c3c;font-weight:bold;}
  .vb{color:#2ecc71;font-weight:bold;}
  .vc{color:#3498db;font-weight:bold;}
  .btn{
    background:#22263a;border:1px solid #3a4060;color:#ccc;
    border-radius:4px;width:20px;height:20px;cursor:pointer;
    font-size:13px;line-height:1;padding:0;text-align:center;
  }
  .btn:hover{background:#3a4060;}
  #det-row{font-size:13px;color:#aaa;border-top:1px solid #252840;padding-top:8px;}
  #hint{font-size:11px;color:#445;margin-top:auto;line-height:1.8;}
  #lsidebar{
    position:absolute;top:0;left:0;bottom:0;width:220px;
    background:rgba(12,14,20,0.78);border-right:1px solid #252840;
    padding:14px;display:flex;flex-direction:column;gap:0;overflow-y:auto;
    font-size:12px;user-select:none;
  }
  .ls-title{font-size:11px;color:#a5c8ff;margin:10px 0 5px;letter-spacing:0.04em;}
  .ls-title:first-child{margin-top:0;}
  .ls-row{line-height:1.85;color:#bbb;}
  .ls-sep{border-top:1px solid #252840;margin:5px 0;}
  .ls-sum{color:#f1c40f;font-weight:bold;line-height:1.85;}
  .pos{color:#5b9;} .neg{color:#c66;}
</style>
</head>

<script>
(function(){
  var DPR=window.devicePixelRatio||1;
  var canvas=document.getElementById("c");
  var ctx=canvas.getContext("2d");
  var cW=0,cH=0;
  var SBW=220, LSW=220;

  var CLR={
    bg:"#1a1d23", grid:"rgba(120,130,160,0.13)",
    x:"#e74c3c", y:"#2ecc71", z:"#3498db",
    a:"#e74c3c", b:"#2ecc71", c:"#3498db"
  };

  /* ── vectors ── */
  var VEC_KEY="det3d_vecs";
  var _sv=(function(){try{var s=localStorage.getItem(VEC_KEY);return s?JSON.parse(s):null;}catch(e){return null;}})();
  var A=_sv?_sv.A:[3,1,1];
  var B=_sv?_sv.B:[1,3,1];
  var C=_sv?_sv.C:[1,1,3];
  var vecs={A:A,B:B,C:C};
  var spans={
    A:[document.getElementById("a0"),document.getElementById("a1"),document.getElementById("a2")],
    B:[document.getElementById("b0"),document.getElementById("b1"),document.getElementById("b2")],
    C:[document.getElementById("c0"),document.getElementById("c1"),document.getElementById("c2")]
  };
  ["A","B","C"].forEach(function(k){vecs[k].forEach(function(v,i){spans[k][i].textContent=v;});});
  function saveVecs(){try{localStorage.setItem(VEC_KEY,JSON.stringify({A:A,B:B,C:C}));}catch(e){}}
  function det3(a,b,c){return a[0]*(b[1]*c[2]-b[2]*c[1])-a[1]*(b[0]*c[2]-b[2]*c[0])+a[2]*(b[0]*c[1]-b[1]*c[0]);}
  function updateDet(){document.getElementById("detval").textContent=det3(A,B,C);}

  function updateFormulas(){
    var ax=A[0],ay=A[1],az=A[2];
    var bx=B[0],by=B[1],bz=B[2];
    var cx=C[0],cy=C[1],cz=C[2];
    var ra='#e74c3c',rb='#2ecc71',rc='#3498db';
    function s(v,c){return '<span style="color:'+c+'">'+v+'</span>';}
    function vspan(v){return '<span style="color:'+(v>=0?'#5b9':'#c66')+'">'+(v>=0?'+':'')+v+'</span>';}

    var m1=by*cz-bz*cy, m2=bx*cz-bz*cx, m3=bx*cy-by*cx;
    var t1=ax*m1, t2=-ay*m2, t3=az*m3;

    document.getElementById("fv1").innerHTML=
      '+'+s(ax,ra)+'·('+s(by,rb)+'·'+s(cz,rc)+'−'+s(bz,rb)+'·'+s(cy,rc)+') = '+vspan(t1);
    document.getElementById("fv2").innerHTML=
      '−'+s(ay,ra)+'·('+s(bx,rb)+'·'+s(cz,rc)+'−'+s(bz,rb)+'·'+s(cx,rc)+') = '+vspan(t2);
    document.getElementById("fv3").innerHTML=
      '+'+s(az,ra)+'·('+s(bx,rb)+'·'+s(cy,rc)+'−'+s(by,rb)+'·'+s(cx,rc)+') = '+vspan(t3);
    document.getElementById("fv-eq").innerHTML='det = '+vspan(t1)+' '+vspan(t2)+' '+vspan(t3)+' = '+(t1+t2+t3);

    var terms=[
      [+ax*by*cz, s(ax,ra)+'·'+s(by,rb)+'·'+s(cz,rc)],
      [-ax*bz*cy, s(ax,ra)+'·'+s(bz,rb)+'·'+s(cy,rc)],
      [-ay*bx*cz, s(ay,ra)+'·'+s(bx,rb)+'·'+s(cz,rc)],
      [+ay*bz*cx, s(ay,ra)+'·'+s(bz,rb)+'·'+s(cx,rc)],
      [+az*bx*cy, s(az,ra)+'·'+s(bx,rb)+'·'+s(cy,rc)],
      [-az*by*cx, s(az,ra)+'·'+s(by,rb)+'·'+s(cx,rc)]
    ];
    var signs=['+','−','−','+','+','−'];
    var sum=0;
    for(var i=0;i<6;i++){
      sum+=terms[i][0];
      document.getElementById("ft"+(i+1)).innerHTML=
        signs[i]+terms[i][1]+' = '+vspan(terms[i][0]);
    }
    document.getElementById("ft-sum").innerHTML='sum = '+sum;
  }
  updateDet();
  updateFormulas();
  /* ── toggles ── */
  var TOG_IDS=["dim-boxes","show-all-figures","show-seconds","show-all-boxes","show-abox","show-abox2","show-aboxes","show-bbox1","show-bbox2","show-bboxes","show-cbox1","show-cbox2","show-cboxes","show-all-pyrs","show-apyrs","show-pyr1","show-pyr2","show-bpyrs","show-pyr5","show-pyr6","show-cpyrs","show-pyr3","show-pyr4","show-all-prisms","show-abprisms","show-prism1","show-prism2","show-acprisms","show-prism3","show-prism4","show-bcprisms","show-prism5","show-prism6"];
  var ALPHA_KEY="det3d_alpha";
  (function(){
    var s=localStorage.getItem(ALPHA_KEY);
    if(s!==null){document.getElementById("alpha-slider").value=s;document.getElementById("alpha-val").textContent=s+"%";}
  })();
  document.getElementById("alpha-slider").addEventListener("input",function(){
    document.getElementById("alpha-val").textContent=this.value+"%";
    try{localStorage.setItem(ALPHA_KEY,this.value);}catch(e){}
  });

  var TOG_KEY="det3d_tog";
  (function(){
    var saved=(function(){try{var s=localStorage.getItem(TOG_KEY);return s?JSON.parse(s):null;}catch(e){return null;}})();
    if(saved) TOG_IDS.forEach(function(id){var el=document.getElementById(id);if(el&&id in saved)el.checked=saved[id];});
  })();
  function saveToggles(){
    var obj={};
    TOG_IDS.forEach(function(id){var el=document.getElementById(id);if(el)obj[id]=el.checked;});
    try{localStorage.setItem(TOG_KEY,JSON.stringify(obj));}catch(e){}
  }
  document.getElementById("ctrl").addEventListener("change",function(e){
    if(e.target.type!=="checkbox")return;
    saveToggles();
  });
  document.getElementById("show-all-boxes").addEventListener("change",function(){

      .forEach(function(id){document.getElementById(id).checked=on;});

    ["show-apyrs","show-pyr1","show-pyr2","show-bpyrs","show-pyr5","show-pyr6","show-cpyrs","show-pyr3","show-pyr4"].forEach(function(id){document.getElementById(id).checked=on;});

  document.getElementById("ctrl").addEventListener("click",function(e){
    var btn=e.target.closest(".btn");if(!btn)return;
    var v=btn.dataset.v,i=+btn.dataset.i,d=+btn.dataset.d;
    vecs[v][i]+=d; spans[v][i].textContent=vecs[v][i];
    saveVecs(); updateDet(); updateFormulas();
  });

  /* ── camera ── */
  var CAM_KEY="det3d_cam";
  var _sc=(function(){try{var s=localStorage.getItem(CAM_KEY);return s?JSON.parse(s):null;}catch(e){return null;}})();
  var cam=_sc?{theta:_sc.theta,phi:_sc.phi}:{theta:0.55,phi:0.50};
  var gScale=_sc?_sc.scale:1.0;
  var drag={active:false,x:0,y:0};
  function saveCam(){try{localStorage.setItem(CAM_KEY,JSON.stringify({theta:cam.theta,phi:cam.phi,scale:gScale}));}catch(e){}}

  window.addEventListener("mousedown",function(e){if(e.target.closest("#ctrl")||e.target.closest("#lsidebar"))return;drag.active=true;drag.x=e.clientX;drag.y=e.clientY;});
  window.addEventListener("mouseup",  function(){if(drag.active){drag.active=false;saveCam();}});
  window.addEventListener("mousemove",function(e){
    if(!drag.active)return;
    cam.theta-=(e.clientX-drag.x)*0.007;
    cam.phi  -=(e.clientY-drag.y)*0.007;
    cam.phi=Math.max(0.05,Math.min(Math.PI/2-0.03,cam.phi));
    drag.x=e.clientX;drag.y=e.clientY;
  });
  window.addEventListener("wheel",function(e){gScale=Math.max(0.2,Math.min(5,gScale-e.deltaY*0.001));saveCam();},{passive:true});

  /* ── projection ── */
  function project(p){
    var ct=Math.cos(cam.theta),st=Math.sin(cam.theta);
    var cp=Math.cos(cam.phi),  sp=Math.sin(cam.phi);
    return [ct*p[0]+st*p[1], -sp*(-st*p[0]+ct*p[1])+cp*p[2]];
  }
  var sc=1,ox=0,oy=0;
  function scr(p){var q=project(p);return{x:ox+q[0]*sc,y:oy-q[1]*sc};}
  function line(a,b){var pa=scr(a),pb=scr(b);ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);}
  function arrow(from,to,col,lw){
    var pa=scr(from),pb=scr(to);
    ctx.beginPath();ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=lw||2;
    ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();
    var dx=pb.x-pa.x,dy=pb.y-pa.y,len=Math.hypot(dx,dy);if(len<1)return;
    var ux=dx/len,uy=dy/len,s=9;
    ctx.beginPath();ctx.moveTo(pb.x,pb.y);
    ctx.lineTo(pb.x-ux*s-uy*s*0.4,pb.y-uy*s+ux*s*0.4);
    ctx.lineTo(pb.x-ux*s+uy*s*0.4,pb.y-uy*s-ux*s*0.4);
    ctx.closePath();ctx.fill();
  }

  /* ── deferred rendering ── */
  var gFaces=[],gEdges=[];
  function dpt(p){
    var ct=Math.cos(cam.theta),st=Math.sin(cam.theta);
    var cp=Math.cos(cam.phi),  sp=Math.sin(cam.phi);
    return cp*(-st*p[0]+ct*p[1])+sp*p[2];
  }
  function avgDpt(pts){var d=0;pts.forEach(function(p){d+=dpt(p);});return d/pts.length;}
  var gBias=0;
  function qface(pts,col,alpha){gFaces.push({pts:pts,col:col,alpha:alpha,d:avgDpt(pts)+gBias});}
  function qedge(pairs,col,lw,dash){gEdges.push({pairs:pairs,col:col,lw:lw,dash:dash||[],d:avgDpt(pairs.map(function(e){return e[0];}).concat(pairs.map(function(e){return e[1];})))+gBias});}
  function flush(){
    gFaces.sort(function(a,b){return a.d-b.d;});
    gFaces.forEach(function(f){
      var ps=f.pts.map(scr);
      ctx.beginPath();ctx.moveTo(ps[0].x,ps[0].y);
      for(var i=1;i<ps.length;i++)ctx.lineTo(ps[i].x,ps[i].y);
      ctx.closePath();ctx.globalAlpha=f.alpha;ctx.fillStyle=f.col;ctx.fill();ctx.globalAlpha=1;
    });
    gFaces=[];
    gEdges.sort(function(a,b){return a.d-b.d;});
    gEdges.forEach(function(g){
      ctx.setLineDash(g.dash);
      ctx.beginPath();ctx.strokeStyle=g.col;ctx.lineWidth=g.lw;
      g.pairs.forEach(function(e){line(e[0],e[1]);});ctx.stroke();
    });
    ctx.setLineDash([]);
    gEdges=[];
  }

  function add3(a,b){return[a[0]+b[0],a[1]+b[1],a[2]+b[2]];}

  function drawPrismGeneric(top4,botFn,col,alpha){
    var bot=top4.map(botFn);
    qface(top4,col,alpha);
    qface(bot,col,alpha);
    for(var i=0;i<4;i++){
      var j=(i+1)%4;
      qface([top4[i],top4[j],bot[j],bot[i]],col,alpha);
    }
    var pairs=[];
    for(var i=0;i<4;i++){
      pairs.push([top4[i],top4[(i+1)%4]]);
      pairs.push([bot[i],bot[(i+1)%4]]);
      pairs.push([top4[i],bot[i]]);
    }
    qedge(pairs,col,1.6);
  }

  function drawProjPrism(top4,projZ,col,alpha){
    drawPrismGeneric(top4,function(p){return[p[0],p[1],projZ];},col,alpha);
  }
  function drawProjPrismY(top4,projY,col,alpha){
    drawPrismGeneric(top4,function(p){return[p[0],projY,p[2]];},col,alpha);
  }
  function drawProjPrismX(top4,projX,col,alpha){
    drawPrismGeneric(top4,function(p){return[projX,p[1],p[2]];},col,alpha);
  }


  function drawBBox(){
    var W=A[0]+B[0]+C[0], H=A[1]+B[1]+C[1], D=A[2]+B[2]+C[2];
    var p000=[0,0,0],p100=[W,0,0],p010=[0,H,0],p001=[0,0,D];
    var p110=[W,H,0],p101=[W,0,D],p011=[0,H,D],p111=[W,H,D];
    qedge([[p000,p100],[p000,p010],[p000,p001],
           [p100,p110],[p100,p101],[p010,p110],[p010,p011],
           [p001,p101],[p001,p011],[p110,p111],[p101,p111],[p011,p111]],
      "rgba(241,196,15,0.5)",1.0,[6,4]);
    /* vertex labels */
    var cx=W/2,cy=H/2,cz=D/2,nf=0.13;
    function bl(pt,t){
      var lp=[pt[0]+(pt[0]-cx)*nf,pt[1]+(pt[1]-cy)*nf,pt[2]+(pt[2]-cz)*nf];
      var p=scr(lp);
      ctx.fillStyle="rgba(241,196,15,0.75)";ctx.font="11px system-ui";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(t,p.x,p.y);
    }
    bl(p000,"O"); bl(p100,"W"); bl(p010,"H"); bl(p001,"D");
    bl(p110,"WH");bl(p101,"WD");bl(p011,"HD");bl(p111,"WHD");
  }

  function drawBox(p1,p2,col,alpha){
    var x0=Math.min(p1[0],p2[0]),x1=Math.max(p1[0],p2[0]);
    var y0=Math.min(p1[1],p2[1]),y1=Math.max(p1[1],p2[1]);
    var z0=Math.min(p1[2],p2[2]),z1=Math.max(p1[2],p2[2]);
    var c=[
      [x0,y0,z0],[x1,y0,z0],[x0,y1,z0],[x0,y0,z1],
      [x1,y1,z0],[x1,y0,z1],[x0,y1,z1],[x1,y1,z1]
    ];
    [[c[0],c[1],c[4],c[2]],[c[3],c[5],c[7],c[6]],
     [c[0],c[1],c[5],c[3]],[c[2],c[4],c[7],c[6]],
     [c[0],c[2],c[6],c[3]],[c[1],c[4],c[7],c[5]]
    ].forEach(function(f){qface(f,col,alpha||0.25);});
    qedge([[c[0],c[1]],[c[0],c[2]],[c[0],c[3]],[c[1],c[4]],[c[1],c[5]],
           [c[2],c[4]],[c[2],c[6]],[c[3],c[5]],[c[3],c[6]],
           [c[4],c[7]],[c[5],c[7]],[c[6],c[7]]],col,1.6);
  }

  function drawPyramid(apex,base4,col,alpha){
    qface(base4,col,alpha);
    for(var i=0;i<4;i++) qface([apex,base4[i],base4[(i+1)%4]],col,alpha);
    var pairs=[];
    for(var i=0;i<4;i++){pairs.push([base4[i],base4[(i+1)%4]]);pairs.push([apex,base4[i]]);}
    qedge(pairs,col,1.6);
  }

  function drawParallelepiped(){
    var O=[0,0,0];
    var AB=add3(A,B),AC=add3(A,C),BC=add3(B,C),ABC=add3(AB,C);
    qface([O,A,AB,B],   "rgba(231,76,60,1)",  0.09);
    qface([O,A,AC,C],   "rgba(231,76,60,1)",  0.07);
    qface([O,B,BC,C],   "rgba(46,204,113,1)", 0.07);
    qface([A,AB,ABC,AC],"rgba(52,152,219,1)", 0.09);
    qface([B,AB,ABC,BC],"rgba(52,152,219,1)", 0.07);
    qface([C,AC,ABC,BC],"rgba(46,204,113,1)", 0.09);
    qedge([[O,A],[O,B],[O,C],[A,AB],[A,AC],[B,AB],[B,BC],[C,AC],[C,BC],[AB,ABC],[AC,ABC],[BC,ABC]],
      "rgba(200,210,230,0.55)",1.2);
    /* vertex labels */
    var cx=ABC[0]/2,cy=ABC[1]/2,cz=ABC[2]/2,nf=0.28;
    function vl(pt,t,col){
      var lp=[pt[0]+(pt[0]-cx)*nf,pt[1]+(pt[1]-cy)*nf,pt[2]+(pt[2]-cz)*nf];
      var p=scr(lp);
      ctx.fillStyle=col;ctx.font="bold 12px system-ui";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(t,p.x,p.y);
    }
    vl(O,    "O",     "#f1c40f");
    vl(A,    "a",     CLR.a);
    vl(B,    "b",     CLR.b);
    vl(C,    "c",     CLR.c);
    vl(AB,   "a+b",   "#ccc");
    vl(AC,   "a+c",   "#ccc");
    vl(BC,   "b+c",   "#ccc");
    vl(ABC,  "a+b+c", "#ccc");
  }

  /* ── tick ── */
  function tick(){
    cW=canvas.width/DPR; cH=canvas.height/DPR;
    sc=Math.min(cW,cH)*gScale/14;
    var ctr=[(A[0]+B[0]+C[0])/2,(A[1]+B[1]+C[1])/2,(A[2]+B[2]+C[2])/2];
    var pc=project(ctr);
    ox=cW/2-pc[0]*sc; oy=cH/2+pc[1]*sc;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.clearRect(0,0,cW,cH);
    ctx.fillStyle=CLR.bg;ctx.fillRect(0,0,cW,cH);

    ctx.save();

    /* grid */
    var G=12;
    ctx.beginPath();ctx.strokeStyle=CLR.grid;ctx.lineWidth=0.8;
    for(var i=-G;i<=G;i++){line([i,-G,0],[i,G,0]);line([-G,i,0],[G,i,0]);}
    ctx.stroke();

    /* axes */
    var L=7;
    arrow([0,0,0],[L,0,0],CLR.x,1.5);
    arrow([0,0,0],[0,L,0],CLR.y,1.5);
    arrow([0,0,0],[0,0,L],CLR.z,1.5);
    ctx.font="bold 13px system-ui";
    ctx.fillStyle=CLR.x; var px=scr([L+0.4,0,0]); ctx.fillText("x",px.x,px.y+4);
    ctx.fillStyle=CLR.y; var py=scr([0,L+0.4,0]); ctx.fillText("y",py.x,py.y+4);
    ctx.fillStyle=CLR.z; var pz=scr([0,0,L+0.4]); ctx.fillText("z",pz.x,pz.y+4);

    /* bbox + parallelepiped */
    drawBBox();
    var W=A[0]+B[0]+C[0],H=A[1]+B[1]+C[1],D=A[2]+B[2]+C[2];
    var dim=document.getElementById("dim-boxes").checked;
    var gAlpha=document.getElementById("alpha-slider").value/100;
    var dc="rgba(140,140,150,0.35)",da=0.04;
    /* prisms: pushed back */
    gBias=20;
    if(document.getElementById("show-prism1").checked){
      var AB=add3(A,B);
      drawProjPrism([[0,0,0],A,AB,B],0,dim?dc:"rgba(200,160,30,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-prism2").checked){
      var AC2=add3(A,C),BC2=add3(B,C),ABC2=add3(add3(A,B),C);
      drawProjPrism([C,AC2,ABC2,BC2],D,dim?dc:"rgba(200,160,30,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-prism3").checked){
      var AB4=add3(A,B),BC4=add3(B,C),ABC4=add3(AB4,C);
      drawProjPrismY([B,AB4,ABC4,BC4],H,dim?dc:"rgba(176,96,224,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-prism4").checked){
      var AC3=add3(A,C);
      drawProjPrismY([[0,0,0],A,AC3,C],0,dim?dc:"rgba(176,96,224,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-prism5").checked){
      var AB6=add3(A,B),AC6=add3(A,C),ABC6=add3(AB6,C);
      drawProjPrismX([A,AB6,ABC6,AC6],W,dim?dc:"rgba(32,184,200,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-prism6").checked){
      var BC5=add3(B,C);
      drawProjPrismX([[0,0,0],B,BC5,C],0,dim?dc:"rgba(32,184,200,1)",dim?da:gAlpha);
    }
    /* boxes: neutral */
    gBias=0;
    if(document.getElementById("show-abox").checked)
      drawBox(A,[W,0,0],dim?dc:"rgba(180,50,50,1)",dim?da:gAlpha);
    if(document.getElementById("show-abox2").checked)
      drawBox([B[0]+C[0],B[1]+C[1],B[2]+C[2]],[0,H,D],dim?dc:"rgba(180,50,50,1)",dim?da:gAlpha);
    if(document.getElementById("show-bbox1").checked)
      drawBox(B,[0,H,0],dim?dc:"rgba(40,160,80,1)",dim?da:gAlpha);
    if(document.getElementById("show-bbox2").checked)
      drawBox([A[0]+C[0],A[1]+C[1],A[2]+C[2]],[W,0,D],dim?dc:"rgba(40,160,80,1)",dim?da:gAlpha);
    if(document.getElementById("show-cbox1").checked)
      drawBox([A[0]+B[0],A[1]+B[1],A[2]+B[2]],[W,H,0],dim?dc:"rgba(40,80,180,1)",dim?da:gAlpha);
    if(document.getElementById("show-cbox2").checked)
      drawBox(C,[0,0,D],dim?dc:"rgba(40,80,180,1)",dim?da:gAlpha);
    /* pyramids: pulled slightly forward */
    gBias=-5;
    if(document.getElementById("show-pyr1").checked){
      var bx=A[0];
      drawPyramid([0,0,0],[[bx,0,0],[bx,A[1],0],A,[bx,0,A[2]]],dim?dc:"rgba(180,50,50,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-pyr2").checked){
      var BC=add3(B,C),bx2=BC[0];
      drawPyramid([W,H,D],[[bx2,BC[1],BC[2]],[bx2,H,BC[2]],[bx2,H,D],[bx2,BC[1],D]],dim?dc:"rgba(180,50,50,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-pyr3").checked){
      var AB=add3(A,B),bz3=AB[2];
      drawPyramid([W,H,D],[[AB[0],AB[1],bz3],[W,AB[1],bz3],[W,H,bz3],[AB[0],H,bz3]],dim?dc:"rgba(40,80,180,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-pyr4").checked){
      drawPyramid([0,0,0],[[0,0,C[2]],[C[0],0,C[2]],C,[0,C[1],C[2]]],dim?dc:"rgba(40,80,180,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-pyr5").checked){
      drawPyramid([0,0,0],[[0,B[1],0],[B[0],B[1],0],B,[0,B[1],B[2]]],dim?dc:"rgba(40,160,80,1)",dim?da:gAlpha);
    }
    if(document.getElementById("show-pyr6").checked){
      var AC=add3(A,C);
      drawPyramid([W,H,D],[[AC[0],AC[1],AC[2]],[W,AC[1],AC[2]],[W,AC[1],D],[AC[0],AC[1],D]],dim?dc:"rgba(40,160,80,1)",dim?da:gAlpha);
    }
    gBias=-10;
    drawParallelepiped();
    gBias=0;
    flush();

    arrow([0,0,0],A,CLR.a,2.5);
    arrow([0,0,0],B,CLR.b,2.5);
    arrow([0,0,0],C,CLR.c,2.5);
    ctx.font="bold 14px system-ui";
    var ha=scr([A[0]/2,A[1]/2,A[2]/2]); ctx.fillStyle=CLR.a; ctx.fillText("a",ha.x-12,ha.y-4);
    var hb=scr([B[0]/2,B[1]/2,B[2]/2]); ctx.fillStyle=CLR.b; ctx.fillText("b",hb.x-12,hb.y+8);
    var hc=scr([C[0]/2,C[1]/2,C[2]/2]); ctx.fillStyle=CLR.c; ctx.fillText("c",hc.x+6, hc.y);

    ctx.restore();
    requestAnimationFrame(tick);
  }

  function resize(){
    cW=window.innerWidth;cH=window.innerHeight;
    canvas.width=Math.round(cW*DPR);canvas.height=Math.round(cH*DPR);
    canvas.style.width=cW+"px";canvas.style.height=cH+"px";
  }
  window.addEventListener("resize",resize);resize();
  requestAnimationFrame(tick);
})();
</script>
